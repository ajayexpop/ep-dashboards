<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Delivery Roadmap</title>
<style>
  :root{
    --navy:#0f1b3d; --teal:#0891b2; --green:#16a34a; --orange:#d97706;
    --blue:#2563eb; --purple:#7c3aed; --red:#dc2626; --amber:#d97706;
    --pink:#db2777; --indigo:#4f46e5;
    --bg:#f4f6fb; --panel:#ffffff; --ink:#131a2b; --ink2:#495468; --muted:#8a94a7;
    --line:#e6e9f0; --line2:#eef1f6; --today:#ef4444;
    --shadow:0 1px 2px rgba(15,27,61,.05),0 12px 34px -14px rgba(15,27,61,.18);
    --shadow-sm:0 1px 2px rgba(15,27,61,.06),0 5px 16px -10px rgba(15,27,61,.22);
    --namecol:300px; --r:12px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums; line-height:1.45;
  }
  h1,h2,h3,h4,p{margin:0}
  .wrap{max-width:1440px;margin:0 auto;padding:0 22px 60px}
  .canvas{min-width:1100px}
  .scroller{overflow-x:auto}

  /* ---------- Header band ---------- */
  .hdr{
    background:var(--navy); color:#fff; border-radius:0 0 var(--r) var(--r);
    padding:26px 30px 0; position:relative; box-shadow:var(--shadow);
  }
  .hdr-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding-bottom:22px}
  .hdr h1{font-size:1.9rem;font-weight:750;letter-spacing:-.4px;line-height:1.05}
  .hdr .sub{color:#aeb8d6;font-size:.92rem;margin-top:7px;font-weight:450}
  .hdr .meta{text-align:right;color:#aeb8d6;font-size:.82rem;line-height:1.7;white-space:nowrap}
  .hdr .meta .team{color:#e7ecf8;font-weight:600}
  .accent-underline{height:4px;background:var(--teal);border-radius:0 0 var(--r) var(--r)}

  /* ---------- Summary chips ---------- */
  .chips{display:flex;gap:16px;flex-wrap:wrap;margin:22px 0 6px}
  .chip{
    flex:1 1 0;min-width:190px;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow-sm);
    display:flex;align-items:center;gap:16px;position:relative;overflow:hidden;
  }
  .chip::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--c)}
  .chip .num{font-size:2.05rem;font-weight:760;line-height:1;color:var(--c);letter-spacing:-1px}
  .chip .lbl{font-size:.82rem;color:var(--ink2);font-weight:550;line-height:1.3}

  /* ---------- Filter bar ---------- */
  .filterbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:20px 0 14px;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
    padding:12px 16px;box-shadow:var(--shadow-sm);
  }
  .search{
    flex:0 0 250px;border:1px solid var(--line);border-radius:8px;padding:8px 12px;
    font-size:.86rem;color:var(--ink);outline:none;background:#fbfcfe;
  }
  .search:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(8,145,178,.12)}
  .pill{
    border:1px solid var(--line);background:#fbfcfe;color:var(--ink2);
    border-radius:999px;padding:6px 13px;font-size:.8rem;font-weight:550;cursor:pointer;
    transition:all .12s ease;user-select:none;white-space:nowrap;
  }
  .pill:hover{border-color:#c7cede;color:var(--ink)}
  .pill.active{background:var(--navy);border-color:var(--navy);color:#fff}
  .itemcount{margin-left:auto;font-size:.82rem;color:var(--muted);font-weight:550;white-space:nowrap}

  /* ---------- Timeline grid ---------- */
  .board{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .tl-head{position:relative;border-bottom:1px solid var(--line)}
  .qrow,.mrow{display:flex}
  .qrow .spacer,.mrow .spacer{flex:0 0 var(--namecol);border-right:1px solid var(--line)}
  .qcells,.mcells{flex:1 1 auto;display:flex;position:relative}
  .qcell{
    text-align:center;font-weight:700;font-size:.86rem;color:var(--ink);
    padding:11px 0 9px;border-right:1px solid var(--line);letter-spacing:.2px;
    background:linear-gradient(#fafbfe,#f4f6fb);
  }
  .qcell:last-child{border-right:none}
  .mcell{
    flex:1 1 0;text-align:center;font-size:.76rem;color:var(--muted);font-weight:600;
    padding:7px 0;border-right:1px solid var(--line2);text-transform:uppercase;letter-spacing:.6px;
  }
  .mcell:last-child{border-right:none}

  /* today line overlay spanning the timeline (name col excluded) */
  .today-line{
    position:absolute;top:0;bottom:0;width:0;border-left:2px dashed var(--today);
    opacity:.5;z-index:6;pointer-events:none;
  }
  .today-line::after{
    content:"TODAY";position:absolute;top:2px;left:5px;font-size:.58rem;font-weight:700;
    color:var(--today);letter-spacing:.5px;opacity:.85;
  }

  /* ---------- Theme groups ---------- */
  .theme-head{
    display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;
    padding:12px 18px 12px 0;border-top:1px solid var(--line);
    background:linear-gradient(#fcfdff,#f7f9fd);position:relative;
  }
  .theme-head:first-child{border-top:none}
  .theme-head .bar{width:6px;align-self:stretch;background:var(--acc);border-radius:0 3px 3px 0}
  .theme-head .caret{color:var(--muted);font-size:.7rem;transition:transform .15s ease;width:12px;text-align:center}
  .theme-head.collapsed .caret{transform:rotate(-90deg)}
  .theme-head .tname{font-size:.82rem;font-weight:750;letter-spacing:1.1px;text-transform:uppercase;color:var(--ink)}
  .theme-head .badge{
    font-size:.72rem;font-weight:650;color:#fff;background:var(--acc);
    border-radius:999px;padding:2px 9px;line-height:1.4;
  }
  .theme-rows{display:block}
  .theme-head.collapsed + .theme-rows{display:none}

  /* ---------- Feature rows ---------- */
  .item-row{display:flex;align-items:stretch;border-top:1px solid var(--line2);min-height:46px;cursor:pointer;transition:background .1s ease}
  .item-row:hover{background:#f8fafd}
  .item-row.open{background:#f2f9fb}
  .item-name{
    flex:0 0 var(--namecol);display:flex;align-items:center;gap:9px;
    padding:8px 14px 8px 34px;border-right:1px solid var(--line);min-width:0;
  }
  .item-name .ntext{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1 1 auto}
  .item-name .fmeta{font-size:.68rem;color:var(--muted);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.1px}
  .item-name .fname{font-size:.85rem;font-weight:560;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .status-badge{
    flex:0 0 auto;font-size:.66rem;font-weight:700;border-radius:5px;padding:2px 7px;
    letter-spacing:.2px;white-space:nowrap;border:1px solid transparent;
  }
  .sb-shipped{color:var(--green);background:rgba(22,163,74,.1);border-color:rgba(22,163,74,.2)}
  .sb-progress{color:var(--orange);background:rgba(217,119,6,.1);border-color:rgba(217,119,6,.2)}
  .sb-blocked{color:var(--red);background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.2)}
  .sb-upcoming{color:var(--blue);background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.2)}
  .sb-phased{color:var(--purple);background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.2)}

  .item-track{flex:1 1 auto;position:relative;display:flex}
  .track-grid{position:absolute;inset:0;display:flex;pointer-events:none}
  .track-grid .g{flex:1 1 0;border-right:1px solid var(--line2)}
  .track-grid .g:last-child{border-right:none}
  .bar{
    position:absolute;top:50%;transform:translateY(-50%);height:20px;border-radius:6px;
    display:flex;align-items:center;justify-content:flex-end;padding:0 6px;z-index:2;
    box-shadow:0 1px 2px rgba(15,27,61,.12);min-width:8px;
  }
  .bar .tick{color:#fff;font-size:.7rem;font-weight:800;line-height:1}
  .bar-shipped{background:var(--green)}
  .bar-progress{background:var(--orange)}
  .bar-blocked{background:var(--red)}
  .bar-upcoming{background:var(--blue)}
  .bar-phased{
    background:repeating-linear-gradient(45deg,rgba(124,58,237,.55),rgba(124,58,237,.55) 7px,rgba(124,58,237,.34) 7px,rgba(124,58,237,.34) 14px);
    border:1px dashed rgba(124,58,237,.7);
  }

  /* ---------- Expand panel ---------- */
  .detail{border-top:1px solid var(--line2);background:#fff;display:none}
  .detail.show{display:block}
  .detail-inner{
    border-left:4px solid var(--teal);margin:12px 18px 16px 34px;background:#fff;
    border-radius:0 10px 10px 0;box-shadow:var(--shadow-sm);padding:16px 20px;position:relative;
  }
  .detail .close{
    position:absolute;top:10px;right:12px;cursor:pointer;color:var(--muted);
    font-size:1.05rem;line-height:1;border:none;background:none;padding:4px;
  }
  .detail .close:hover{color:var(--ink)}
  .wwo{display:flex;gap:26px;flex-wrap:wrap}
  .wwo .col{flex:1 1 240px;min-width:0}
  .wwo .k{font-size:.66rem;font-weight:750;letter-spacing:1px;text-transform:uppercase;color:var(--teal);margin-bottom:5px}
  .wwo .v{font-size:.86rem;color:var(--ink2);line-height:1.5}
  .det-init{margin-top:12px;padding-top:10px;border-top:1px solid var(--line2);font-size:.72rem;color:var(--muted);font-weight:500;letter-spacing:.2px}

  /* ---------- Footer ---------- */
  .footer{
    margin-top:20px;font-size:.76rem;color:var(--muted);line-height:1.65;
    border-top:1px solid var(--line);padding-top:16px;white-space:pre-line;
  }
  .empty{padding:40px;text-align:center;color:var(--muted);font-size:.9rem;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="scroller">
    <div class="canvas">
      <!-- Header band -->
      <header class="hdr">
        <div class="hdr-inner">
          <div>
            <h1 id="epTitle"></h1>
            <div class="sub" id="epSub"></div>
          </div>
          <div class="meta">
            <div id="epUpdated"></div>
            <div class="team" id="epTeam"></div>
          </div>
        </div>
        <div class="accent-underline"></div>
      </header>

      <!-- Summary chips -->
      <div class="chips" id="chips"></div>

      <!-- Filter bar -->
      <div class="filterbar">
        <input type="text" class="search" id="search" placeholder="Search features..." aria-label="Search features">
        <div id="pills" style="display:flex;gap:8px;flex-wrap:wrap"></div>
        <span class="itemcount" id="itemcount"></span>
      </div>

      <!-- Board -->
      <div class="board">
        <div class="tl-head">
          <div class="qrow">
            <div class="spacer"></div>
            <div class="qcells" id="qcells"></div>
          </div>
          <div class="mrow">
            <div class="spacer"></div>
            <div class="mcells" id="mcells"></div>
          </div>
          <div class="today-line" id="todayLineHead"></div>
        </div>
        <div id="groups"></div>
        <div class="empty" id="empty">No features match your filters.</div>
      </div>

      <!-- Footer -->
      <div class="footer" id="footer"></div>
    </div>
  </div>
</div>

<script id="roadmap-data" type="application/json">{"title":"Product Delivery Roadmap","subtitle":"2026 delivery \u00b7 242 stories across 14 product areas","team":"ExpoPlatform Product Team","lastUpdated":"2026-07-07","todayPct":88.48,"months":["Jan","Feb","Mar","Apr","May","Jun","Jul"],"quarters":[{"label":"Q1 2026","span":3},{"label":"Q2 2026","span":3},{"label":"Q3 2026","span":1}],"footer":"Bars show each story's delivery window (Created to Resolved; in-progress items run to today). Grouped by client-facing product area. Click any row for What / Why / Outcome, and theme headers to collapse. Source: EP delivery ledger, 242 stories as of 2026-07-07.","themes":[{"name":"Website & Page Builder","accent":"#0891b2","features":[{"key":"EP-50339","name":"Website Builder now lets organizers hide the call-to-action...","status":"Shipped","startPct":35.48,"endPct":46.67,"what":"Website Builder now lets organizers hide the call-to-action button on individual cards via a per-card toggle, removing the previous reliance on custom CSS.","why":"Self-Service / Customer Request - a per-card toggle removes a custom-CSS workaround and gives organizers direct, code-free control.","outcome":"A per-card toggle was added to the Website Builder card component so organizers can show or hide the button on each card independently.","team":"Visitor team","size":"S","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-50364","name":"Closed a styling-consistency gap in Website Builder so every...","status":"Shipped","startPct":35.48,"endPct":46.67,"what":"Closed a styling-consistency gap in Website Builder so every static card view can carry borders and shadows, giving organizers a uniform, professional event-site look without design hacks.","why":"Operational Efficiency and UX consistency - to remove design workarounds and align card behaviour across the builder, raising the quality of organizer-built event websites.","outcome":"Border and shadow options were added to the card views that previously lacked them, while views that already supported the styling were left unchanged.","team":"Visitor team","size":"S","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-52647","name":"Adds the user-facing entry point that lets organizers describe...","status":"In Progress","startPct":56.67,"endPct":88.48,"what":"Adds the user-facing entry point that lets organizers describe website CSS changes in natural language, the first step of the AI-assisted Website Builder.","why":"Product Vision - foundational UI for the AI-Assisted Website Builder Phase I initiative that moves styling toward self-service AI assistance.","outcome":"A UI entry point where a user can express desired CSS changes, wiring the front end into the broader AI website-builder flow.","team":"Visitor team","size":"XL","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-52648","name":"Implements server-side serialization of website-builder block...","status":"In Progress","startPct":56.67,"endPct":88.48,"what":"Implements server-side serialization of website-builder block HTML snapshots, persisting each block's rendered output so AI-assisted event sites render reliably and reproducibly.","why":"Product Vision - foundational capability for the AI-Assisted Website Builder (Phase I).","outcome":"Block HTML snapshots are serialized and stored, giving the builder a stable representation of page blocks. Full detail lives in the linked Confluence page (a short wiki link that could not be auto-resolved to a page ID).","team":"Visitor team","size":"L","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-52649","name":"Builds a secure backend proxy so the AI Website Builder can...","status":"In Progress","startPct":56.67,"endPct":88.48,"what":"Builds a secure backend proxy so the AI Website Builder can call AI providers without exposing credentials to the browser.","why":"Platform Health - secure, centralized backend plumbing is a prerequisite for shipping the AI-Assisted Website Builder safely.","outcome":"A backend proxy that brokers AI requests for the website builder, keeping provider credentials and orchestration server-side.","team":"Visitor team","size":"XL","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-52650","name":"Makes the AI Website Builder apply generated CSS scoped to only...","status":"In Progress","startPct":56.67,"endPct":88.48,"what":"Makes the AI Website Builder apply generated CSS scoped to only the block being edited, with a preview-before-apply step, so TAMs can restyle one block without risking other blocks or the global event site.","why":"AI Enablement - core safety guardrail for the AI-Assisted Website Builder.","outcome":"Generated CSS is shown for review, then, on confirmation, scoped to the block's data-styleid selector only (never the global CUSTOM_CODE_CSS), with oversized responses rejected and other blocks left untouched.","team":"Visitor team","size":"L","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-52651","name":"Teaches the AI Website Builder to interpret plain-language...","status":"In Progress","startPct":56.67,"endPct":88.48,"what":"Teaches the AI Website Builder to interpret plain-language styling requests (e.g. 'make the title bigger') into design-system-token CSS, so TAMs and organizers can style blocks with no CSS knowledge.","why":"AI Enablement - natural-language styling is a headline capability of the AI-Assisted Website Builder.","outcome":"The AI generator maps everyday prompts to the correct elements and design-system tokens (e.g. var(--primary-color)), targets block-scoped elements, and clearly refuses structural/HTML changes as out of Phase 1 scope.","team":"Visitor team","size":"L","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-53398","name":"Backend tracking story for removing the legacy '/newfront' path...","status":"In Progress","startPct":62.67,"endPct":88.48,"what":"Backend tracking story for removing the legacy '/newfront' path segment from URLs as part of the New Front migration, cleaning up legacy routing and technical debt.","why":"Platform Health - mirrors the Engineering Innovation New Front migration epic to retire legacy routing in the backend.","outcome":"Backend analysis and tracking toward removing '/newfront' from routing/config while keeping existing pages and APIs working (acceptance criteria pending backend impact analysis).","team":"Visitor team","size":"XXL","initiative":"Website & Event Site Builder - give organizers a flexible, on-brand event website"},{"key":"EP-54690","name":"Adds payer search (by name, surname or email) to the...","status":"In Progress","startPct":79.52,"endPct":88.48,"what":"Adds payer search (by name, surname or email) to the Transaction Dashboard and Invoice Payments admin pages, letting event admins locate a payment record instantly instead of scrolling paginated lists, a request that...","why":"Customer Request - client-chased request from ACI Asia-Pacific & Middle East flagged as a renewal blocker.","outcome":"A search field on both payments pages that matches the Account Name (first name, surname, email) with partial matching, explicit search/enter trigger, page-1 reset, empty-state and clear behaviour, while leaving...","team":"Organizer team","size":"S","initiative":"Not Clearly Specified"}]},{"name":"Mobile & Attendee Experience","accent":"#16a34a","features":[{"key":"EP-48029","name":"The mobile Favorites experience is being reworked to add...","status":"In Progress","startPct":5.53,"endPct":88.48,"what":"The mobile Favorites experience is being reworked to add hall/booth filtering and sorting and to align with Web, so attendees can plan on-site visits to their favorited exhibitors and products efficiently.","why":"Product Vision improvement to attendee on-site planning and cross-platform consistency.","outcome":"Consolidating Favorites into one page with All/Mutual/Exhibitor/Visitor/Product/Speaker tabs and richer filter/sort options aligned to Web (in progress).","team":"Mobile team","size":"","initiative":"Mobile App - a first-class on-site experience in the pocket"},{"key":"EP-48297","name":"Custom badge errors in the Aditus integration now route users...","status":"Shipped","startPct":8.76,"endPct":25.51,"what":"Custom badge errors in the Aditus integration now route users to a clear, localized error page (with German) instead of silently reverting to the native badge, so attendees know what action to take.","why":"Client commitment/UX fix for an event using the Aditus custom badge integration, including required German localization.","outcome":"Users are redirected to appropriate error pages with refined English copy and added German variants for no-connection and no-information cases.","team":"Mobile team","size":"M","initiative":"Mobile App - a first-class on-site experience in the pocket"},{"key":"EP-49318","name":"Adding a configurable second external login button to the...","status":"Shipped","startPct":20.41,"endPct":32.72,"what":"Adding a configurable second external login button to the mobile app lets a client offer attendees an alternate webview-based sign-in path, satisfying a specific customer requirement.","why":"Customer Request - a client explicitly requested a secondary login button using the existing external webview login flow.","outcome":"A second external login button was added to the native login screen (type 'Both'), opening the existing webview login flow with configurable label/colour, plus new App Builder/API settings to control it.","team":"Mobile team","size":"S","initiative":"Mobile App - a first-class on-site experience in the pocket"},{"key":"EP-51659","name":"Added a badge-scan-gated email visibility setting in the mobile...","status":"Shipped","startPct":46.67,"endPct":60.37,"what":"Added a badge-scan-gated email visibility setting in the mobile app so attendee emails appear only after their badge is scanned, balancing privacy with lead capture at IMEX.","why":"Client Commitment - an IMEX requirement to gate email visibility behind badge scans.","outcome":"A new toggle 'Show Visitor email ONLY after badge scan' was added; when enabled with profile email hidden, email appears on a profile only after a successful badge scan.","team":"Mobile team","size":"L","initiative":"Mobile App - a first-class on-site experience in the pocket"}]},{"name":"Networking & Meetings","accent":"#7c3aed","features":[{"key":"EP-47793","name":"A scroll hint was added to the time picker so users immediately...","status":"Shipped","startPct":2.76,"endPct":21.94,"what":"A scroll hint was added to the time picker so users immediately realise more time slots are available below the fold, reducing missed selections when booking meetings.","why":"Product Vision usability refinement of the scheduling component to remove a subtle but recurring interaction trap.","outcome":"A visual scroll hint cue was introduced on the time picker control.","team":"Exhibitor team","size":"M","initiative":"Not Clearly Specified"},{"key":"EP-47919","name":"Organizers can now clone Product Category custom filters within...","status":"Shipped","startPct":3.69,"endPct":21.94,"what":"Organizers can now clone Product Category custom filters within an event, eliminating the manual rebuild of complex filter sets every time a new event is created or cloned.","why":"Operational efficiency and scalability improvement to event setup, reducing repetitive organizer work.","outcome":"Backend capability to clone Product Category custom filters within an event during the pre-event phase.","team":"Organizer team","size":"M","initiative":"Not Clearly Specified"},{"key":"EP- am":"Exhibitor team","size":"","initiative":"Meetings & Networking - turn matchmaking into meetings that actually happen"},{"key":"EP-48459","name":"The Speed Networking service can now exchange its large...","status":"Shipped","startPct":10.14,"endPct":11.94,"what":"The Speed Networking service can now exchange its large input/output JSON via S3 through dedicated API endpoints, removing payload-size and reliability limits so matchmaking calculations scale cleanly.","why":"Scalability initiative to handle large networking payloads via object storage rather than inline transfer.","outcome":"Added three API endpoints to request an S3 location for input, trigger the Speed Networking calculation, and poll status/retrieve the output location, including in-progress responses.","team":"Data Science","size":"","initiative":"Improving existing tools"},{"key":"EP-48752","name":"Meeting Program gained sorting options for its Relevance and...","status":"Shipped","startPct":13.36,"endPct":45.71,"what":"Meeting Program gained sorting options for its Relevance and Opt-in phases, letting organizers order participants meaningfully during matchmaking instead of working from an unsorted list.","why":"Product Vision enhancement to the meeting-program matchmaking workflow.","outcome":"Added sorting options for the Relevance and opt-in phases of the Meeting Program.","team":"Exhibitor team","size":"M","initiative":"Not Clearly Specified"},{"key":"EP-48851","name":"Surfacing meeting ratings inside the organizer's All Meetings...","status":"Shipped","startPct":15.31,"endPct":29.03,"what":"Surfacing meeting ratings inside the organizer's All Meetings tab gives event teams an at-a-glance read on meeting quality across the whole programme.","why":"Operational Efficiency - organizers needed meeting-quality signals in the reporting view they already use, rather than digging per-meeting.","outcome":"The All Meetings tab of the Meeting Program report now displays the rating each meeting received, es by engagement, with filtering, sorting, and drill-down to session detail (PRD R17).","team":"Data Science","size":"S","initiative":"New Analytics"},{"key":"EP-52369","name":"A Products Deep Dive dashboard was delivered (currently in...","status":"In Progress","startPct":53.33,"endPct":88.48,"what":"A Products Deep Dive dashboard was delivered (currently in testing) covering product categories, top products, and listing metrics for organisers.","why":"Part of the New Analytics initiative to deliver automated reporting dashboards per the PRD (Product Vision / Internal Efficiency).","outcome":"A Products Deep Dive page provides Top-20 categories and Top-20 products ranked tables plus product KPI cards with filtering and drill-down (PRD R18); the story is in testing.","team":"Data Science","size":"S","initiative":"New Analytics"},{"key":"EP-52392","name":"The new Event Reporting dashboards were embedded as a dedicated...","status":"In Progress","startPct":53.33,"endPct":88.48,"what":"The new Event Reporting dashboards were embedded as a dedicated sub-section under the existing Analytics module in the organiser admin panel, delivering the UX/UI integration for multiple dashboards.","why":"Part of the New Analytics initiative to integrate the reporting dashboards into the organiser admin UX (Product Vision / Internal Efficiency).","outcome":"Not Clearly Specified (story is in testing; the dashboards - including Attendee Analytics, Connections Deep Dive, Logins, and Session Duration - are being embedded as a new Analytics sub-section in the left navigation...","team":"Organizer team","size":"XL","initiative":"New Analytics"},{"key":"EP-53548","name":"Adds front-end format validation, placeholder and help text to...","status":"Shipped","startPct":65.44,"endPct":79.05,"what":"Adds front-end format validation, placeholder and help text to the Google Analytics (GA4) ID field in the Admin Panel, while still allowing an empty value to disable tracking.","why":"Customer Request - part of restoring GA support; prevents misconfiguration of GA4 tracking by organizers.","outcome":"The GA ID input now validates the GA4 format (G-XXXXXXXXXX), shows placeholder and help text warning against duplicate GA injection, and permits an empty value to clear tracking.","team":"Organizer team","size":"M","initiative":"New Analytics"},{"key":"EP-55029","name":"Consolidates TAM feedback on the Embedded Analytics module into...","status":"In Progress","startPct":86.18,"endPct":88.48,"what":"Consolidates TAM feedback on the Embedded Analytics module into a prioritised set of improvements (default date ranges, decluttered views, decimal formatting, filtered totals, platform-split logins, clearer terminology...","why":"Customer Request - consolidated TAM/client feedback to improve the Embedded Analytics experience.","outcome":"A structured set of improvement requests captured against the Embedded Analytics epic, covering default date range, reduced clutter, 2-decimal percentages, filtered totals, Android/iOS login split, clearer terminology...","team":"Data Science","size":"M","initiative":"New Analytics"}]},{"name":"Platform Performance & Reliability","accent":"#db2777","features":[{"key":"EP-47884","name":"The Meeting Transcription Tool's infrastructure-as-code was...","status":"Shipped","startPct":3.23,"endPct":5.03,"what":"The Meeting Transcription Tool's infrastructure-as-code was rebuilt to the standard set by the Recommendation Service, making the AI service reproducible and safer to deploy as it moves from POC toward production.","why":"Technical Debt reduction to harden a maturing AI service ahead of production readiness.","outcome":"MTT infrastructure-as-code was refactored to follow Recommendation Service best practices.","team":"Data Science","size":"","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-48618","name":"The CDS participant integration now supports paginated pulls...","status":"Shipped","startPct":12.44,"endPct":14.24,"what":"The CDS participant integration now supports paginated pulls with full field mapping and admin-configurable parameters, enabling reliable large-volume registration sync for the client.","why":"Client commitment to deliver a scalable native integration with the CDS registration API.","outcome":"Implemented paginated participant import mapping reg fields to participant data, email-based update matching, and admin-panel settings for OrderType and IncludeItems.","team":"Integration team","size":"","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-49138","name":"Establishes documented, measurable availability and latency...","status":"In Progress","startPct":18.88,"endPct":88.48,"what":"Establishes documented, measurable availability and latency SLOs for every endpoint the Exhibitor team owns, giving engineering leadership service-level visibility into platform reliability.","why":"Platform Health - part of the company-wide SLO establishment initiative to make reliability explicit and measurable per team.","outcome":"A documented set of availability and latency SLOs (and any application-specific golden-path targets) for the Exhibitor team's owned endpoints, based on Grafana data and agreed by the whole team, published in the...","team":"Exhibitor team","size":"M","initiative":"ExpoPlatform SLOs establishment"},{"key":"EP-49211","name":"Reworking the mobile global force-resync so it no longer logs...","status":"Shipped","startPct":19.39,"endPct":21.19,"what":"Reworking the mobile global force-resync so it no longer logs users out lets organizers fully reset event data mid-event (delivered for Shoptalk) without disrupting attendees.","why":"Client Commitment - needed for the Shoptalk event so a full resync could run without logging users out, mirroring in-app settings resync behaviour.","outcome":"The admin-panel global resync was modified to perform a full reset/resync without logging users out, matching the in-app settings resync functionality.","team":"Mobile team","size":"","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-52175","name":"The AI Search service was made highly available across two AWS...","status":"Shipped","startPct":52.38,"endPct":68.66,"what":"The AI Search service was made highly available across two AWS zones, load-tested, and costed, de-risking it for production launch.","why":"Reliability phase of the Search & Discovery initiative to ensure the service is resilient and its economics understood (Scalability Initiative / Platform Health).","outcome":"The Search API now runs across two AWS availability zones, load testing was completed with Locust, and a monthly cost estimate covering AWS, OpenAI, and Qdrant was produced.","team":"Data Science","size":"M","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-52457","name":"Universal pagination memory was implemented for required lists...","status":"Shipped","startPct":54.29,"endPct":76.67,"what":"Universal pagination memory was implemented for required lists in the admin panel, so the platform remembers an organiser's page position as they navigate.","why":"Prioritised as a usability/efficiency improvement to standardise pagination behaviour in the admin panel (Internal Efficiency / Product Vision).","outcome":"Required admin-panel lists now retain pagination state across navigation, giving consistent page-position memory for organisers.","team":"Organizer team","size":"L","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-52566","name":"Google+ was removed as an option from the brand-creation social...","status":"Shipped","startPct":55.71,"endPct":62.21,"what":"Google+ was removed as an option from the brand-creation social media links, cleaning up a defunct social network from exhibitor brand profiles.","why":"Routine cleanup to remove a dead third-party option from the brand-creation UI (Internal Efficiency / Platform Health).","outcome":"Google+ was removed from the social media link options in brand creation, leaving only relevant, active networks.","team":"Exhibitor team","size":"S","initiative":"Not Clearly Specified"},{"key":"EP-52989","name":"Standardizes pagination behavior across the Admin Panel so...","status":"Shipped","startPct":59.91,"endPct":76.67,"what":"Standardizes pagination behavior across the Admin Panel so organizers get a consistent navigation experience between list screens.","why":"Internal Efficiency - UX consistency work under the Admin Panel restructure to reduce friction and confusion.","outcome":"A standardized pagination pattern applied across Admin Panel listings.","team":"Organizer team","size":"S","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-53117","name":"Implements universal pagination memory so the Admin Panel...","status":"Shipped","startPct":62.21,"endPct":79.05,"what":"Implements universal pagination memory so the Admin Panel remembers a user's page position across listings, building on the pagination standardization effort.","why":"Internal Efficiency - a quality-of-life enhancement under the Admin Panel restructure to reduce repetitive navigation.","outcome":"Pagination position is now retained (remembered) across Admin Panel lists, reducing repeated paging.","team":"Organizer team","size":"L","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-53519","name":"Re-architects the email pipeline for resilience - isolating...","status":"In Progress","startPct":64.98,"endPct":88.48,"what":"Re-architects the email pipeline for resilience - isolating transactional from marketing streams, adding per-client (tenant) isolation, ingress email validation and a per-client rate-limit kill-switch - to stop one bad...","why":"Platform Health - flagged as highest priority by the stakeholder citing existential business risk and ongoing revenue loss ('without emails the platform does not exist').","outcome":"Design and build toward two isolated SES streams, per-tenant tracking/throttle/pause, ingress email validation (RFC-5322, MX, blocklist, suppression) and a per-client kill-switch replacing the platform-wide cutoff, with...","team":"Not Clearly Specified","size":"L","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-54179","name":"AI search results are now paginated, letting users browse...","status":"Shipped","startPct":72.86,"endPct":76.67,"what":"AI search results are now paginated, letting users browse beyond the first page of semantic results without re-running the whole search.","why":"Scalability Initiative agreed in the DS team meeting: a stateless offset/frame_size approach delivers pagination quickly, with stable-pagination caching deliberately deferred.","outcome":"The AI search API accepts offset and frame_size parameters and returns the correct Qdrant ranking window, combining correctly with allowed_ids filtering.","team":"Data Science","size":"M","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"},{"key":"EP-54438","name":"The recommendation/inference service's caching layer was...","status":"In Progress","startPct":76.19,"endPct":88.48,"what":"The recommendation/inference service's caching layer was reworked - incremental updates, async data pulls, compression and SLO/SLI wiring - to remove the production bottleneck identified in event data analysis.","why":"Platform Health / Scalability Initiative - first phase of a rollout plan (EP-54244) to make the recommendation service performant and observable enough to scale with production traffic.","outcome":"Phase one caching improvements: incremental row updates instead of full collection, asynchronous data pulls, cache data compression, and SLO/SLI instrumentation for the service.","team":"Data Science","size":"L","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability"}]},{"name":"Trust, Privacy & Compliance","accent":"#4f46e5","features":[{"key":"EP-53978","name":"Lets privacy-opted-out attendees favourite exhibitors, products...","status":"In Progress","startPct":70.05,"endPct":88.48,"what":"Lets privacy-opted-out attendees favourite exhibitors, products and people fully anonymously, satisfying strict GDPR (notably Germany/IMEX) expectations while still hinting interest to the other party via a combined...","why":"Compliance Requirement - GDPR-driven privacy requirement tied to IMEX and German data-protection expectations.","outcome":"Opted-out users can favourite/unfavourite on web and app with the action kept out of notifications, the interaction dashboard, downloaded leads and the public API, never counted as a lead, preserved even if the user...","team":"Exhibitor team","size":"L","initiative":"Privacy, GDPR & Compliance - trust by default"}]}]}</script>
<script>
(function(){
  "use strict";
  var DATA = JSON.parse(document.getElementById("roadmap-data").textContent);

  // ---- status -> css class + badge label -------------------------------
  function statusClass(s){
    switch(s){
      case "Shipped": return "shipped";
      case "In Progress": return "progress";
      case "Blocked": return "blocked";
      default: return "progress";
    }
  }
  function badgeText(s){ return s; }

  // ---- flatten features (keep theme ref) --------------------------------
  var themes = DATA.themes || [];
  var allFeatures = [];
  themes.forEach(function(t, ti){
    (t.features||[]).forEach(function(f, fi){
      allFeatures.push({f:f, theme:t, ti:ti, fi:fi, id:"f-"+ti+"-"+fi});
    });
  });

  // ---- computed summary numbers -----------------------------------------
  var nShipped = 0, nProgress = 0;
  allFeatures.forEach(function(x){
    var s = x.f.status;
    if(s === "Shipped") nShipped++;
    else nProgress++; // In Progress (delivery ledger has only Shipped / In Progress)
  });
  var nThemes = themes.length;
  var nTotal = allFeatures.length;

  // ---- header -----------------------------------------------------------
  document.getElementById("epTitle").textContent = DATA.title || "";
  document.getElementById("epSub").textContent = DATA.subtitle || "";
  document.getElementById("epTeam").textContent = DATA.team || "";
  document.getElementById("epUpdated").textContent = "Last updated: " + (DATA.lastUpdated || "");
  document.getElementById("footer").textContent = DATA.footer || "";

  // ---- summary chips ----------------------------------------------------
  var chipDefs = [
    {num:nShipped, lbl:"Shipped", c:"var(--green)"},
    {num:nProgress, lbl:"In Progress", c:"var(--orange)"},
    {num:nTotal, lbl:"Stories", c:"var(--blue)"},
    {num:nThemes, lbl:"Product Areas", c:"var(--purple)"}
  ];
  var chipsEl = document.getElementById("chips");
  chipDefs.forEach(function(c){
    var d = document.createElement("div");
    d.className = "chip"; d.style.setProperty("--c", c.c);
    var n = document.createElement("div"); n.className="num"; n.textContent = String(c.num);
    var l = document.createElement("div"); l.className="lbl"; l.textContent = c.lbl;
    d.appendChild(n); d.appendChild(l); chipsEl.appendChild(d);
  });

  // ---- quarter + month headers ------------------------------------------
  var months = DATA.months || [];
  var quarters = DATA.quarters || [];
  var qEl = document.getElementById("qcells");
  quarters.forEach(function(q){
    var c = document.createElement("div");
    c.className = "qcell";
    c.style.flex = (q.span||1) + " 1 0";
    c.textContent = q.label;
    qEl.appendChild(c);
  });
  var mEl = document.getElementById("mcells");
  months.forEach(function(m){
    var c = document.createElement("div"); c.className="mcell"; c.textContent = m; mEl.appendChild(c);
  });

  // ---- today line -------------------------------------------------------
  var todayPct = (typeof DATA.todayPct === "number") ? DATA.todayPct : 46;
  document.getElementById("todayLineHead").style.left = "calc(var(--namecol) + (100% - var(--namecol)) * " + (todayPct/100) + ")";

  // ---- filter state -----------------------------------------------------
  // Quarter pills filter by the feature's delivery-window overlap with the
  // quarter's percentage span across the timeline. Quarters + their spans
  // come from the data, so this stays correct as the timeline grows.
  var totalMonths = months.length || 1;
  var qBounds = [];   // {key,label,startPct,endPct}
  (function(){
    var acc = 0;
    quarters.forEach(function(q, qi){
      var span = q.span || 1;
      var startPct = (acc / totalMonths) * 100;
      var endPct = ((acc + span) / totalMonths) * 100;
      acc += span;
      // short key from the label's leading token (e.g. "Q1 2026" -> "q1")
      var short = ((q.label || ("q"+(qi+1))).split(/\s+/)[0] || ("Q"+(qi+1))).toLowerCase();
      qBounds.push({key:short, label:(q.label||"").split(/\s+/)[0]||("Q"+(qi+1)), startPct:startPct, endPct:endPct});
    });
  })();
  function featIn(f, q){
    // overlap test between the feature bar [startPct,endPct] and the quarter span
    var sp = Math.max(0, Math.min(100, f.startPct||0));
    var ep = Math.max(0, Math.min(100, f.endPct||0));
    if(ep < sp){ var t=sp; sp=ep; ep=t; }
    return sp < q.endPct && ep > q.startPct;
  }
  var FILTERS = [
    {key:"all", label:"All", test:function(){ return true; }},
    {key:"shipped", label:"Shipped", test:function(f){ return f.status==="Shipped"; }},
    {key:"progress", label:"In Progress", test:function(f){ return f.status==="In Progress"; }}
  ];
  qBounds.forEach(function(q){
    FILTERS.push({key:q.key, label:q.label, test:(function(qb){ return function(f){ return featIn(f, qb); }; })(q)});
  });
  var activeFilter = "all";
  var searchTerm = "";

  var pillsEl = document.getElementById("pills");
  FILTERS.forEach(function(fl){
    var p = document.createElement("div");
    p.className = "pill" + (fl.key==="all" ? " active" : "");
    p.textContent = fl.label;
    p.setAttribute("data-key", fl.key);
    p.addEventListener("click", function(){
      activeFilter = fl.key;
      Array.prototype.forEach.call(pillsEl.children, function(ch){
        ch.classList.toggle("active", ch.getAttribute("data-key")===activeFilter);
      });
      render();
    });
    pillsEl.appendChild(p);
  });

  var searchInput = document.getElementById("search");
  searchInput.addEventListener("input", function(){
    searchTerm = (searchInput.value||"").trim().toLowerCase();
    render();
  });

  function matches(x){
    var f = x.f;
    var flt = FILTERS.filter(function(z){ return z.key===activeFilter; })[0];
    if(flt && !flt.test(f)) return false;
    if(searchTerm){
      var hay = ((f.name||"") + " " + (f.key||"")).toLowerCase();
      if(hay.indexOf(searchTerm) === -1) return false;
    }
    return true;
  }

  // ---- build the theme groups + rows (once), then toggle visibility -----
  var groupsEl = document.getElementById("groups");
  var openRowId = null;

  function buildGrid(){
    var frag = document.createDocumentFragment();
    themes.forEach(function(t, ti){
      var head = document.createElement("div");
      head.className = "theme-head";
      head.style.setProperty("--acc", t.accent || "#0891b2");
      head.setAttribute("data-theme", String(ti));

      var bar = document.createElement("div"); bar.className="bar";
      var caret = document.createElement("div"); caret.className="caret"; caret.textContent="▼";
      var nm = document.createElement("div"); nm.className="tname"; nm.textContent = t.name || "";
      var badge = document.createElement("div"); badge.className="badge";
      badge.textContent = String((t.features||[]).length);
      head.appendChild(bar); head.appendChild(caret); head.appendChild(nm); head.appendChild(badge);

      head.addEventListener("click", function(){ head.classList.toggle("collapsed"); });

      var rows = document.createElement("div");
      rows.className = "theme-rows";
      rows.setAttribute("data-rows", String(ti));

      (t.features||[]).forEach(function(f, fi){
        var rowId = "f-"+ti+"-"+fi;
        var sc = statusClass(f.status);

        var row = document.createElement("div");
        row.className = "item-row";
        row.setAttribute("data-row", rowId);
        row.setAttribute("data-status", f.status);
        row.setAttribute("data-name", (f.name||"").toLowerCase());

        // left: name (+ traceability subtitle) + status badge
        var name = document.createElement("div"); name.className="item-name";
        var ntext = document.createElement("div"); ntext.className="ntext";
        var fn = document.createElement("span"); fn.className="fname"; fn.textContent = f.name || "";
        ntext.appendChild(fn);
        var metaBits = [f.key, f.team, f.size].filter(function(z){ return z && String(z).trim(); });
        if(metaBits.length){
          var fm = document.createElement("span"); fm.className="fmeta";
          fm.textContent = metaBits.join(" \u00b7 ");
          ntext.appendChild(fm);
        }
        var sb = document.createElement("span"); sb.className="status-badge sb-"+sc; sb.textContent = badgeText(f.status);
        name.appendChild(ntext); name.appendChild(sb);

        // right: track + bar
        var track = document.createElement("div"); track.className="item-track";
        var tg = document.createElement("div"); tg.className="track-grid";
        for(var g=0; g<months.length; g++){ var gg=document.createElement("div"); gg.className="g"; tg.appendChild(gg); }
        track.appendChild(tg);

        var bar2 = document.createElement("div"); bar2.className="bar bar-"+sc;
        var sp = Math.max(0, Math.min(100, f.startPct||0));
        var ep = Math.max(0, Math.min(100, f.endPct||0));
        if(ep < sp){ var tmp=sp; sp=ep; ep=tmp; }
        bar2.style.left = sp + "%";
        bar2.style.width = Math.max(0.5, (ep - sp)) + "%";
        if(f.status === "Shipped"){
          var tk = document.createElement("span"); tk.className="tick"; tk.textContent="✓"; bar2.appendChild(tk);
        }
        track.appendChild(bar2);

        row.appendChild(name); row.appendChild(track);

        // detail panel
        var detail = document.createElement("div");
        detail.className = "detail";
        detail.setAttribute("data-detail", rowId);
        var di = document.createElement("div"); di.className="detail-inner";
        var cls = document.createElement("button"); cls.className="close"; cls.setAttribute("aria-label","Close"); cls.textContent="×";
        var wwo = document.createElement("div"); wwo.className="wwo";
        [["What", f.what],["Why", f.why],["Outcome", f.outcome]].forEach(function(pair){
          var col = document.createElement("div"); col.className="col";
          var k = document.createElement("div"); k.className="k"; k.textContent = pair[0];
          var v = document.createElement("div"); v.className="v"; v.textContent = pair[1] || "";
          col.appendChild(k); col.appendChild(v); wwo.appendChild(col);
        });
        di.appendChild(cls); di.appendChild(wwo);
        // preserve the originating Jira Initiative for internal readers
        if(f.initiative){
          var initLine = document.createElement("div"); initLine.className="det-init";
          initLine.textContent = "Initiative: " + f.initiative;
          di.appendChild(initLine);
        }
        detail.appendChild(di);

        cls.addEventListener("click", function(ev){ ev.stopPropagation(); closeRow(); });
        row.addEventListener("click", function(){ toggleRow(rowId); });

        rows.appendChild(row);
        rows.appendChild(detail);
      });

      frag.appendChild(head);
      frag.appendChild(rows);
    });
    groupsEl.appendChild(frag);
  }

  function closeRow(){
    if(openRowId){
      var od = groupsEl.querySelector('[data-detail="'+openRowId+'"]');
      var orow = groupsEl.querySelector('[data-row="'+openRowId+'"]');
      if(od) od.classList.remove("show");
      if(orow) orow.classList.remove("open");
      openRowId = null;
    }
  }
  function toggleRow(rowId){
    if(openRowId === rowId){ closeRow(); return; }
    closeRow();
    var d = groupsEl.querySelector('[data-detail="'+rowId+'"]');
    var r = groupsEl.querySelector('[data-row="'+rowId+'"]');
    if(d) d.classList.add("show");
    if(r) r.classList.add("open");
    openRowId = rowId;
  }

  // ---- render: apply filters + search, update counts --------------------
  function render(){
    var visible = 0;
    themes.forEach(function(t, ti){
      var rowsWrap = groupsEl.querySelector('[data-rows="'+ti+'"]');
      var head = groupsEl.querySelector('.theme-head[data-theme="'+ti+'"]');
      var anyVisible = false;
      (t.features||[]).forEach(function(f, fi){
        var rowId = "f-"+ti+"-"+fi;
        var row = rowsWrap.querySelector('[data-row="'+rowId+'"]');
        var det = rowsWrap.querySelector('[data-detail="'+rowId+'"]');
        var show = matches({f:f});
        row.style.display = show ? "" : "none";
        if(!show && det){ det.classList.remove("show"); if(openRowId===rowId){ row.classList.remove("open"); openRowId=null; } }
        if(show){ visible++; anyVisible = true; }
      });
      // hide the whole theme group if nothing visible in it
      head.style.display = anyVisible ? "" : "none";
      rowsWrap.style.display = anyVisible ? "" : (head.classList.contains("collapsed") ? "none" : "none");
    });
    document.getElementById("itemcount").textContent = visible + " item" + (visible===1?"":"s");
    document.getElementById("empty").style.display = visible===0 ? "block" : "none";
  }

  buildGrid();
  render();

  // expose a tiny hook for tests
  window.roadmapStats = {
    themes:nThemes, total:nTotal,
    shipped:nShipped, progress:nProgress,
