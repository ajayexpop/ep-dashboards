var D = {"epics":[{"i":0,"n":"Search Anatomy","l":"Search Anatomy","c":"AI","th":"AI & Automation","co":"#4f46e5","v":692,"st":11,"sh":6,"ini":"Search & Discovery - attendees find the right people and content instantly","w":"The AI Search stack was deployed to AWS ECS behind a load balancer with health checks, auto-restart, and traffic- and queue-based auto-scaling, making search production-grade and resilient.","wy":"Deployment phase of the Search & Discovery initiative to run the service resiliently at scale (Scalability Initiative / Platform Health).","o":"Search API, Ingest service, and pg-listener run on ECS; the Search API sits behind an ALB with /health checks, crashed containers auto-restart, the API auto-scales on traffic, and ingest workers auto-scale on SQS queue depth.","ch":"AI-led"},{"i":1,"n":"Qdrant Pilot (IMEX)","l":"Qdrant Pilot","c":"AI","th":"AI & Automation","co":"#4f46e5","v":524,"st":10,"sh":10,"ini":"AI first paradigm - AI agents","w":"Search autocomplete now prioritises name matches over description matches, so attendees see the most relevant entity at the top of suggestion results.","wy":"Customer Request / Product Vision - correct result ranking is essential to the AI search experience being piloted for events like IMEX.","o":"Autocomplete ranking was changed so name matches are prioritised over description matches across and within entity types.","ch":"AI-led"},{"i":2,"n":"Recreate category-based Recommendation Service","l":"Recommendations","c":"AI","th":"AI & Automation","co":"#4f46e5","v":373,"st":5,"sh":4,"ini":"New Recommendation service","w":"Cutting the recommendation service's cold-start time (previously 30-50s on a tenant's first request) sharply improves responsiveness of matchmaking for the first user of each event.","wy":"Scalability Initiative / Platform Health - slow cold starts degraded the matchmaking experience and needed optimisation.","o":"The recommendation inference cold-start path was optimised to significantly reduce first-request response time without affecting recommendation accuracy.","ch":"AI-led"},{"i":3,"n":"Meeting Transcription Tool (MTT, a.k.a. AI Meeting notes) transforming from POC to prod & refactoring","l":"AI Notes","c":"AI","th":"AI & Automation","co":"#4f46e5","v":353,"st":6,"sh":4,"ini":"AI first paradigm - AI agents","w":"AI meeting-notes now sends one shared action-point list to all participants instead of per-person lists, eliminating a defect where misattributed speakers sent people the wrong action items.","wy":"Platform health/quality fix to make the AI meeting-notes output reliable for all recipients.","o":"Action points are combined into a single list sent identically to every participant, with speaker-name prefixes and a 2-6 item range.","ch":"AI-led"},{"i":4,"n":"AI Search Service (tools)","l":"AI Search","c":"AI","th":"AI & Automation","co":"#4f46e5","v":200,"st":1,"sh":1,"ini":"AI first paradigm - AI agents","w":"A new AI search service was developed and deployed behind an API tool, letting participants semantically search exhibitor profiles, team members and products, and laying core AI search infrastructure for the platform.","wy":"AI readiness initiative to build foundational AI search exposed as a reusable API tool.","o":"Built and deployed an AI search service (exposed via API) covering exhibitor profiles, team-member profiles, and products/sessions, after evaluating PGVector vs Typesense alternatives.","ch":"AI-led"},{"i":5,"n":"AI-Assisted Website Builder Phase I","l":"AI Website Builder","c":"AI","th":"AI & Automation","co":"#4f46e5","v":124,"st":5,"sh":0,"ini":"Website & Event Site Builder - give organizers a flexible, on-brand event website","w":"Adds the user-facing entry point that lets organizers describe website CSS changes in natural language, the first step of the AI-assisted Website Builder.","wy":"Product Vision - foundational UI for the AI-Assisted Website Builder Phase I initiative that moves styling toward self-service AI assistance.","o":"A UI entry point where a user can express desired CSS changes, wiring the front end into the broader AI website-builder flow.","ch":"AI-led"},{"i":6,"n":"AI Event Assistant (AGENT)","l":"AI Assistant","c":"AI","th":"AI & Automation","co":"#4f46e5","v":48,"st":1,"sh":1,"ini":"AI first paradigm - AI agents","w":"Built the sessions/agenda knowledge tool for the Phase-1 AI assistant so attendees can ask about sessions by day, topic, time or format instead of scrolling the full agenda.","wy":"Product Vision / AI Enablement - one of the two core knowledge domains required for the AI agent PoC.","o":"A sessions tool was built and integrated into the AI agent, answering session questions by day, topic, time and format from structured event data.","ch":"AI-led"},{"i":7,"n":"Rolling out new solution","l":"Rec. Rollout","c":"AI","th":"AI & Automation","co":"#4f46e5","v":16,"st":1,"sh":0,"ini":"New Recommendation service","w":"Re-architects the recommendation service to the Data Science team's aligned rollout plan, cutting the high cost of running the current architecture while preserving existing recommendation behaviour.","wy":"Internal Efficiency - reduce the operating cost of the recommendation service per the DS rollout plan.","o":"The recommendation service is updated to the new agreed DS architecture, preserving functionality while updating configuration, dependencies and deployment, validated with tests and monitoring.","ch":"AI-led"},{"i":8,"n":"Hyve Q1.26 delievery","l":"Hyve Q1 Delivery","c":"COST","th":"Cost & Labour Reduction","co":"#0891b2","v":899,"st":10,"sh":10,"ini":"Not Clearly Specified","w":"The user-facing side of No Show lets meeting participants themselves register a counterpart's no-show, feeding attendance accuracy from both sides of each meeting.","wy":"Customer Request / Operational Efficiency - completing the No Show feature on the user side captures attendance signals directly from attendees.","o":"A user-facing No Show capability was delivered so meeting participants can flag no-shows themselves, complementing the admin control.","ch":"Labour down"},{"i":9,"n":"Native Integrations - Migrations","l":"Native Integrations","c":"COST","th":"Cost & Labour Reduction","co":"#0891b2","v":428,"st":4,"sh":3,"ini":"Native Integration - Migration to Abstract Integration Schema","w":"The ExpoFP floorplan integration was migrated onto the platform's Integration Hub auto-update framework, gaining self-healing and a logs viewer so exhibitor sync stays accurate without manual developer intervention.","wy":"Operational Efficiency and Maintenance - consolidating a one-off, error-prone integration onto the standard Integration Hub reduces support load and inherits shared tooling (logs viewer, auto-sync, retained history).","o":"ExpoFP now runs on the Hub's auto-update schema: removed exhibitors are recreated automatically, exhibitor changes batch into a dedicated five-minute sync run, one month of sync history is retained, and the integration inherits the Hub logs viewer.","ch":"Labour down"},{"i":10,"n":"Meeting Formats: Admin Re-arrangement","l":"Meeting Formats","c":"COST","th":"Cost & Labour Reduction","co":"#0891b2","v":272,"st":6,"sh":6,"ini":"Meetings & Networking - turn matchmaking into meetings that actually happen","w":"Module management for Meeting Format was restructured in the admin panel, providing a cleaner foundation for how organizers configure meeting-format modules.","wy":"Operational Efficiency / Product Vision - restructuring module management improves usability and prepares the area for further meeting-format features.","o":"The admin-panel module-management experience for Meeting Format was reorganised into a clearer structure.","ch":"Labour down"},{"i":11,"n":"Client Manager & Onboarding","l":"Client Manager","c":"COST","th":"Cost & Labour Reduction","co":"#0891b2","v":64,"st":1,"sh":0,"ini":"Client Manager Redesign + Onboarding + Admin Panel Redesign","w":"Adds granular checkboxes to event cloning so organizers choose exactly which content (sponsors, news, sessions, local categories, floor plan) carries over, removing hours of manual cleanup on large events.","wy":"Customer Request - reduce manual cleanup for organizers and TAMs (feature request EP-44916).","o":"The cloning dialog exposes independent checkboxes for each content category, so only selected data is carried into the new event.","ch":"Labour down"},{"i":12,"n":"Customer Feature Requests","l":"Customer Requests","c":"COST","th":"Cost & Labour Reduction","co":"#0891b2","v":48,"st":1,"sh":1,"ini":"Not Clearly Specified","w":"Added natural-order sorting and multi-select bulk delete to the internal floorplan, sharply cutting the manual effort organizers spend managing halls and stands for large events.","wy":"Operational Efficiency / Scalability - make floorplan administration viable at large-event scale.","o":"Halls and stands can be returned in natural alphanumeric order and selected (including select-all) for bulk deletion.","ch":"Labour down"},{"i":13,"n":"Exhibitor profile","l":"Exhibitor Profile","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":457,"st":6,"sh":6,"ini":"Exhibitor Experience - a polished, self-serve exhibitor presence","w":"Adds the hosting Exhibitor's name to Exhibitor Event detail cards so attendees can identify the organizer without returning to the list view.","wy":"Customer Request - closes a list-vs-detail information gap for attendees identifying exhibitor-hosted events.","o":"Exhibitor Event detail cards now display the hosting Exhibitor name, matching the list view across Web, iOS and Android.","ch":"6 shipped"},{"i":14,"n":"API V3 & Integrations 2026","l":"API v3 Integrations","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":396,"st":5,"sh":4,"ini":"API V3","w":"The final tranche of work for the MYS native integration was delivered, closing out the remaining gaps so the MYS client's end-to-end integration needs are fully met.","wy":"Hive/client commitment to complete the contracted MYS integration scope.","o":"Completed the remaining MYS integration tasks (stage 2) covering the outstanding user needs.","ch":"4 shipped"},{"i":15,"n":"Sessions & Agenda UX (New UI)","l":"Sessions UX","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":390,"st":5,"sh":3,"ini":"Sessions & Agenda Experience - help attendees discover, plan, and never miss a session","w":"Ensures a paid Sponsor's organization name is always shown across Session cards, pages, modals, recommendations and round-table/exhibitor-event surfaces, even when no logo is uploaded.","wy":"Customer Request - protects sponsor recognition that organizers have sold, regardless of logo availability.","o":"Sponsor organization name now always displays across all session-related surfaces, alongside the logo or a standardized placeholder when none exists.","ch":"3 shipped"},{"i":16,"n":"Participant Registration on New UI","l":"Registration UI","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":304,"st":4,"sh":3,"ini":"Registration Re-platform - one unified, higher-converting signup flow","w":"Login was split into two clear flows, SAML SSO for buyers and standard EP login for API-created team members, so both user types can authenticate without the SSO path blocking those who need credentials.","wy":"Client commitment to support mixed authentication, presenting users a choice between SSO and standard login.","o":"A sign-in modal now offers two options: SAML redirect to the identity provider, or the standard EP login flow.","ch":"3 shipped"},{"i":17,"n":"Mobile App - 2026 Enhancements","l":"Mobile App","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":294,"st":5,"sh":3,"ini":"Mobile App - a first-class on-site experience in the pocket","w":"Custom badge errors in the Aditus integration now route users to a clear, localized error page (with German) instead of silently reverting to the native badge, so attendees know what action to take.","wy":"Client commitment/UX fix for an event using the Aditus custom badge integration, including required German localization.","o":"Users are redirected to appropriate error pages with refined English copy and added German variants for no-connection and no-information cases.","ch":"3 shipped"},{"i":18,"n":"Admin Panel CSS Redesign - Phase 1 (5 Core Pages)","l":"Admin Redesign","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":256,"st":4,"sh":0,"ini":"Admin Redesign","w":"Restyles the Event Setup admin page to the new Untitled UI design language (CSS-only, no markup or logic changes), modernizing one of the most-used organizer setup screens.","wy":"Product Vision - admin panel modernization under the Untitled UI redesign.","o":"The Event Setup page visually matches the Untitled UI design language with all existing functionality intact, using the shared Untitled UI Redesign.css.","ch":"Platform-wide"},{"i":19,"n":"Website Builder & Event Site 2026","l":"Website Builder","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":195,"st":3,"sh":2,"ini":"Website & Event Site Builder - give organizers a flexible, on-brand event website","w":"Website Builder now lets organizers hide the call-to-action button on individual cards via a per-card toggle, removing the previous reliance on custom CSS.","wy":"Self-Service / Customer Request - a per-card toggle removes a custom-CSS workaround and gives organizers direct, code-free control.","o":"A per-card toggle was added to the Website Builder card component so organizers can show or hide the button on each card independently.","ch":"2 shipped"},{"i":20,"n":"Improve Existing Search & Elasticsearch","l":"Elasticsearch","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":154,"st":3,"sh":2,"ini":"Search & Discovery - attendees find the right people and content instantly","w":"Brought organizer Campaign email recommendation blocks up to the visitor-side standard with clear boundaries and full-width card layouts, so event emails look consistent and professional.","wy":"UX consistency / Product Vision - align recommendation block styling across all types and with the visitor experience.","o":"Each recommendation block now has a consistent boundary and its cards use the full block width across Exhibitors, Products, News and Sponsors, on desktop and mobile, with no change to recommendation logic.","ch":"2 shipped"},{"i":21,"n":"Communication Channels - Email, Chat & Notifications","l":"Comms Channels","c":"EXP","th":"Experience & Engagement","co":"#db2777","v":115,"st":2,"sh":1,"ini":"Communication & Engagement - keep every audience informed, connected, and coming back","w":"Messenger now lets users filter conversations by status, cutting the time attendees and exhibitors spend hunting through a cluttered inbox to find active or pending threads.","wy":"Product Vision improvement to the core networking/messaging experience, raising day-of-event usability of a heavily used surface.","o":"Conversation status filters were added to Messenger so users can narrow the thread list by state.","ch":"1 shipped"},{"i":22,"n":"Improve Meetings & Scheduling","l":"Meetings & Scheduling","c":"DATA","th":"Data, Insight & Trust","co":"#16a34a","v":544,"st":7,"sh":6,"ini":"Meetings & Networking - turn matchmaking into meetings that actually happen","w":"A toggle now lets organizers fully disable notifications for a specific Meeting Program on Web and App, delivered as an urgent hotfix to meet a HYVE requirement to suppress unwanted meeting alerts.","wy":"Hive urgent client requirement delivered as a hotfix exception.","o":"Added a 'Disable notifications' ON/OFF toggle (default OFF) on Meeting Program create/edit settings that suppresses all related Web and App notifications when enabled.","ch":"6 shipped"},{"i":23,"n":"Automated Event Reporting Dashboards (Embeddable.com)","l":"Auto Reporting","c":"DATA","th":"Data, Insight & Trust","co":"#16a34a","v":486,"st":11,"sh":6,"ini":"New Analytics","w":"A Sponsorships Deep Dive dashboard was delivered (currently in testing), reporting sponsor performance by asset type for organisers.","wy":"Part of the New Analytics initiative to deliver automated reporting dashboards per the PRD (Product Vision / Revenue Opportunity).","o":"A Sponsorships Deep Dive page provides a per-sponsor/asset performance table (views, clicks, CTR) and sponsor KPI cards, with logic to filter to confirmed sponsors only (PRD R21); the story is in testing.","ch":"6 shipped"},{"i":24,"n":"Attendance & Event Analytics 2026","l":"Event Analytics","c":"DATA","th":"Data, Insight & Trust","co":"#16a34a","v":128,"st":2,"sh":2,"ini":"New Analytics","w":"Organizers of co-located events can now compare check-ins across those events and see crossover check-ins in the Total Check-In/Check-Out graph, unlocking shared-attendance insight for multi-event venues.","wy":"Customer Request / Operational Efficiency - co-located event organizers needed combined check-in analytics and badge-origin filtering.","o":"The Total Check-In / Check-Out graph now supports comparing check-ins across co-located events and surfaces crossover check-ins, filterable by badge origin.","ch":"2 shipped"},{"i":25,"n":"IMEX GDPR Requirements","l":"GDPR","c":"DATA","th":"Data, Insight & Trust","co":"#16a34a","v":112,"st":1,"sh":0,"ini":"Privacy, GDPR & Compliance - trust by default","w":"Lets privacy-opted-out attendees favourite exhibitors, products and people fully anonymously, satisfying strict GDPR (notably Germany/IMEX) expectations while still hinting interest to the other party via a combined, tooltip-explained count","wy":"Compliance Requirement - GDPR-driven privacy requirement tied to IMEX and German data-protection expectations.","o":"Opted-out users can favourite/unfavourite on web and app with the action kept out of notifications, the interaction dashboard, downloaded leads and the public API, never counted as a lead, preserved even if the user later opts in, plus tooltips clarifying that","ch":"Value 112"},{"i":26,"n":"Platform Performance & Operational Efficiency 2026","l":"Perf & Efficiency","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":927,"st":10,"sh":8,"ini":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability","w":"The AI Search service was made highly available across two AWS zones, load-tested, and costed, de-risking it for production launch.","wy":"Reliability phase of the Search & Discovery initiative to ensure the service is resilient and its economics understood (Scalability Initiative / Platform Health).","o":"The Search API now runs across two AWS availability zones, load testing was completed with Locust, and a monthly cost estimate covering AWS, OpenAI, and Qdrant was produced.","ch":"Platform-wide"},{"i":27,"n":"API V2 - Quality Assurance","l":"API V2 QA","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":816,"st":51,"sh":51,"ini":"API V2 - Quality Assurance","w":"Hardened the public Open API v2 /api/v2/account/exists endpoint through dedicated QA so external integrators get a reliable, well-tested interface.","wy":"Quality Assurance - part of the structured API V2 QA initiative to validate every Open API endpoint before broad use.","o":"Executed a full QA pass on /api/v2/account/exists, with any defects logged as individual linked bugs, raising confidence in the endpoint's correctness.","ch":"Platform-wide"},{"i":28,"n":"Improve Speed Networking Service","l":"Speed Networking","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":710,"st":8,"sh":6,"ini":"Improving existing tools","w":"Hardened the Speed Networking algorithm to reject and error on invalid input instead of silently ignoring it, preventing meetings being scheduled into blocked slots - a problem seen after a Hyve event.","wy":"Platform Health / Hive requirement - correct data-validation conflicts surfaced during Hyve meeting generation.","o":"The algorithm now returns a 400 and logs an error for any input failing validation, applied broadly beyond just blocked timeslots.","ch":"Platform-wide"},{"i":29,"n":"Migration of endpoints (Public API v3)","l":"API v3 Endpoints","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":432,"st":14,"sh":11,"ini":"API V3","w":"Introduced a net-new V3 endpoint to retrieve event sponsors with full profile, category and placement data, broadening the public API's coverage for partner integrations.","wy":"Future Proofing / integration capability - expose sponsor data via the modern V3 API.","o":"A new GET /api/v3/events/{eventId}/sponsors endpoint was delivered returning sponsor profile, category and placement configuration with pagination.","ch":"Platform-wide"},{"i":30,"n":"Add new endpoints (v3)","l":"New v3 Endpoints","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":112,"st":1,"sh":1,"ini":"API V3","w":"Meetings export was migrated to the V3 public API with rich filtering and incremental sync, letting integration partners pull meeting data reliably and at scale.","wy":"Product Vision/platform modernisation of the public integration surface, part of the API V3 programme.","o":"Delivered GET /api/v3/meetings with pagination, time/created/modified filters, account filtering and timestamp-based incremental fetch returning ISO8601 data.","ch":"Platform-wide"},{"i":31,"n":"Migrate Integration-team tests from teststone \u2192 PHP (Codeception/Pest) + e2e-testing","l":"Test Migration","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":32,"st":2,"sh":0,"ini":"API V2 - Quality Assurance","w":"The Integration team's trial test plans for the Event Statistics and Session Program contexts were migrated from the teststone repository into the e2e testing repository, consolidating test ownership and tooling.","wy":"Technical Debt / Maintenance - executing the Test Automation Strategy to migrate Integration-team tests off teststone into the standard e2e repository as the single source of truth.","o":"Trial test plans and supporting docs for Event Statistics and Session Program were moved into the e2e repository, with updates now made only there and tests re-classified and re-levelled.","ch":"Platform-wide"},{"i":32,"n":"SLOs are established per team","l":"Team SLOs","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":20,"st":1,"sh":0,"ini":"ExpoPlatform SLOs establishment","w":"Establishes documented, measurable availability and latency SLOs for every endpoint the Exhibitor team owns, giving engineering leadership service-level visibility into platform reliability.","wy":"Platform Health - part of the company-wide SLO establishment initiative to make reliability explicit and measurable per team.","o":"A documented set of availability and latency SLOs (and any application-specific golden-path targets) for the Exhibitor team's owned endpoints, based on Grafana data and agreed by the whole team, published in the Engineering Confluence space.","ch":"Platform-wide"},{"i":33,"n":"Covering Existing Functionality with Tests","l":"Test Coverage","c":"INTEG","th":"Integrations & Platform","co":"#2563eb","v":16,"st":1,"sh":0,"ini":"API V2 - Quality Assurance","w":"The Import Participants feature is being brought under full automated-test coverage with consolidated business, technical, and test documentation following the standard quality process.","wy":"Part of the initiative to cover existing functionality with tests, paying down test debt on core features (Platform Health / Internal Efficiency).","o":"Not Clearly Specified (story is still In Progress; the five-step process of BA/tech docs, BE/FE/E2E test plans, test implementation into CI/CD, and QA sign-off is underway but not yet complete).","ch":"Platform-wide"},{"i":34,"n":"Lead Capture pro settings","l":"Lead Capture","c":"REV","th":"Revenue & Monetisation","co":"#d97706","v":775,"st":12,"sh":11,"ini":"Lead Intelligence & Capture - turn every scan into qualified pipeline","w":"Updates how exhibitor lead contribution is calculated so that meeting appointments feed into the lead scoring exhibitors see.","wy":"Customer Request - improves the accuracy of Lead Intelligence value reporting that exhibitors rely on.","o":"Revised lead-contribution calculation that incorporates meeting appointments into exhibitor lead metrics.","ch":"11 shipped"},{"i":35,"n":"Admin Panel Restructure & Navigation","l":"Admin Navigation","c":"REV","th":"Revenue & Monetisation","co":"#d97706","v":496,"st":7,"sh":7,"ini":"Client Manager Redesign + Onboarding + Admin Panel Redesign","w":"Sponsors and sponsored products can now be displayed in randomized order on the web platform, giving every paying sponsor fairer visibility rotation.","wy":"Revenue Opportunity / Customer Request - fair sponsor rotation strengthens the sponsorship product that organizers monetise.","o":"A random sorting mode was added for Sponsors and Sponsored Products so their display order is shuffled rather than fixed by priority.","ch":"7 shipped"}],"clusters":[{"k":"AI","n":"AI & Automation","sh":"AI & Automation","co":"#4f46e5","f":true,"d":"Machine intelligence that does the work for people: search, recommendations, agents and meeting notes.","v":2330,"ne":8,"ns":40,"top":[{"n":"Search Anatomy","v":692},{"n":"Qdrant Pilot (IMEX)","v":524},{"n":"Recreate category-based Recommendation Service","v":373}]},{"k":"COST","n":"Cost & Labour Reduction","sh":"Cost & Labour","co":"#0891b2","f":true,"d":"Automating manual effort and self-service so teams run more events with less hands-on work.","v":1711,"ne":5,"ns":22,"top":[{"n":"Hyve Q1.26 delievery","v":899},{"n":"Native Integrations - Migrations","v":428},{"n":"Meeting Formats: Admin Re-arrangement","v":272}]},{"k":"EXP","n":"Experience & Engagement","sh":"Experience","co":"#db2777","f":false,"d":"The attendee, exhibitor and organiser experience: mobile, websites, networking and sessions.","v":2767,"ne":12,"ns":42,"top":[{"n":"Exhibitor profile","v":457},{"n":"API V3 & Integrations 2026","v":396},{"n":"Sessions & Agenda UX (New UI)","v":390}]},{"k":"DATA","n":"Data, Insight & Trust","sh":"Data & Trust","co":"#16a34a","f":false,"d":"Analytics, reporting and privacy/GDPR work that turns event activity into trusted insight.","v":1270,"ne":4,"ns":21,"top":[{"n":"Improve Meetings & Scheduling","v":544},{"n":"Automated Event Reporting Dashboards (Embeddable.com)","v":486},{"n":"Attendance & Event Analytics 2026","v":128}]},{"k":"INTEG","n":"Integrations & Platform","sh":"Integrations","co":"#2563eb","f":false,"d":"APIs, integrations, scalability and reliability that let the platform scale to more events with less risk.","v":3065,"ne":8,"ns":88,"top":[{"n":"Platform Performance & Operational Efficiency 2026","v":927},{"n":"API V2 - Quality Assurance","v":816},{"n":"Improve Speed Networking Service","v":710}]},{"k":"REV","n":"Revenue & Monetisation","sh":"Revenue","co":"#d97706","f":false,"d":"Features that grow sponsor, lead and ticketing income for organisers and the platform.","v":1271,"ne":2,"ns":19,"top":[{"n":"Lead Capture pro settings","v":775},{"n":"Admin Panel Restructure & Navigation","v":496}]}],"meta":{"stories":242,"value":13044,"themes":6,"ref":[100,450,950]}};
var EP = {}, CL = {};
D.epics.forEach(function(e){ EP[e.i] = e; });
D.clusters.forEach(function(c){ CL[c.k] = c; });
var byId = function(id){ return document.getElementById(id); };
var svg = byId('impact-svg'), tip = byId('tip'), panel = byId('panel'), pbody = byId('panel-body'), status = byId('theme-status');
var isolated = null;
if(!svg || !tip || !panel || !pbody){ return; }
Array.prototype.slice.call(svg.querySelectorAll('title')).forEach(function(t){ t.parentNode.removeChild(t); });
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function all(sel){ return Array.prototype.slice.call(document.querySelectorAll(sel)); }
function tipHTML(e){
  var h = '<div class="tt-th"><span class="tt-dot" style="background:'+e.co+'"></span>'+esc(e.th)+'</div>';
  h += '<div class="tt-name">'+esc(e.n)+'</div>';
  h += '<div class="tt-row"><b>'+e.v+'</b> value <span class="tt-sep">&middot;</span> '+e.sh+' / '+e.st+' stories shipped</div>';
  h += '<div class="tt-ini">'+esc(e.ini)+'</div>';
  if(e.w){ h += '<div class="tt-what">'+esc(e.w)+'</div>'; }
  return h;
}
function showTip(e){ tip.innerHTML = tipHTML(e); tip.classList.add('show'); tip.setAttribute('aria-hidden','false'); }
function moveTip(ev){
  var pad = 14, tw = tip.offsetWidth || 260, th = tip.offsetHeight || 120;
  var x = ev.clientX + pad, y = ev.clientY + pad;
  if(x + tw > window.innerWidth - 8){ x = ev.clientX - tw - pad; }
  if(y + th > window.innerHeight - 8){ y = ev.clientY - th - pad; }
  if(x < 8){ x = 8; } if(y < 8){ y = 8; }
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip(){ tip.classList.remove('show'); tip.setAttribute('aria-hidden','true'); }
function statCell(label, val){ return '<div class="p-stat"><div class="p-statv">'+val+'</div><div class="p-statl">'+esc(label)+'</div></div>'; }
function field(lab, val){ return '<div class="p-field"><div class="p-lab">'+esc(lab)+'</div><div class="p-val">'+esc(val)+'</div></div>'; }
function openEpic(i){
  var e = EP[i]; if(!e){ return; }
  var h = '<div class="p-th"><span class="tt-dot" style="background:'+e.co+'"></span>'+esc(e.th)+'</div>';
  h += '<h2 class="p-name">'+esc(e.n)+'</h2>';
  if(e.ch){ h += '<div class="p-chip" style="background:'+e.co+'">'+esc(e.ch)+'</div>'; }
  h += '<div class="p-stats">'+statCell('Value score', e.v)+statCell('Stories', e.sh+' / '+e.st)+'</div>';
  h += field('Initiative', e.ini);
  if(e.w){ h += field('What', e.w); }
  if(e.wy){ h += field('Why', e.wy); }
  if(e.o){ h += field('Outcome', e.o); }
  pbody.innerHTML = h; openPanel();
}
function openCluster(k){
  var c = CL[k]; if(!c){ return; }
  var h = '<div class="p-th"><span class="tt-dot" style="background:'+c.co+'"></span>'+esc(c.n)+(c.f?' <span class="p-star">featured</span>':'')+'</div>';
  h += '<h2 class="p-name">'+esc(c.n)+'</h2>';
  if(c.d){ h += '<div class="p-desc">'+esc(c.d)+'</div>'; }
  h += '<div class="p-stats">'+statCell('Value', (c.v||0).toLocaleString())+statCell('Epics', c.ne)+statCell('Stories', c.ns)+'</div>';
  if(c.top && c.top.length){
    h += '<div class="p-lab">Top epics by value</div><ol class="p-top">';
    c.top.forEach(function(t){ h += '<li><span>'+esc(t.n)+'</span><b>'+t.v+'</b></li>'; });
    h += '</ol>';
  }
  h += '<button class="p-reset" id="p-reset">Show all themes</button>';
  pbody.innerHTML = h; openPanel();
  var rb = byId('p-reset'); if(rb){ rb.addEventListener('click', function(){ resetIso(); closePanel(); }); }
}
function openPanel(){ panel.classList.add('open'); panel.setAttribute('aria-hidden','false'); hideTip(); }
function closePanel(){ panel.classList.remove('open'); panel.setAttribute('aria-hidden','true'); }
function setOp(sel, keep, dim){
  all(sel).forEach(function(g){ g.style.opacity = (keep === null || g.getAttribute('data-cl') === keep) ? '1' : dim; });
}
function isolate(k){
  isolated = k;
  setOp('.cluster', k, '0.12'); setOp('.chip', k, '0.12'); setOp('.leg', k, '0.4');
  if(status){ status.textContent = 'Showing: ' + (CL[k]?CL[k].sh:k) + '   (reset)'; status.setAttribute('fill', '#3a3f4b'); }
}
function resetIso(){
  isolated = null;
  setOp('.cluster', null, '1'); setOp('.chip', null, '1'); setOp('.leg', null, '1');
  if(status){ status.textContent = 'All themes'; status.setAttribute('fill', '#9aa1ac'); }
}
function toggleIso(k){ if(isolated === k){ resetIso(); closePanel(); } else { isolate(k); openCluster(k); } }
function peek(k){ if(isolated){ return; } setOp('.cluster', k, '0.32'); }
function unpeek(){ if(isolated){ return; } setOp('.cluster', null, '1'); }
all('.bubble').forEach(function(el){
  var i = parseInt(el.getAttribute('data-epic'), 10);
  el.addEventListener('mouseenter', function(){ var e = EP[i]; if(e){ showTip(e); } });
  el.addEventListener('mouseover', function(){ var e = EP[i]; if(e){ showTip(e); } });
  el.addEventListener('mousemove', moveTip);
  el.addEventListener('mouseleave', hideTip);
  el.addEventListener('mouseout', hideTip);
  el.addEventListener('click', function(ev){ ev.stopPropagation(); openEpic(i); });
});
all('.leg').forEach(function(g){
  var k = g.getAttribute('data-cl');
  g.addEventListener('mouseenter', function(){ peek(k); });
  g.addEventListener('mouseleave', unpeek);
  g.addEventListener('click', function(ev){ ev.stopPropagation(); toggleIso(k); });
});
all('.cl-rim').forEach(function(g){
  var k = g.getAttribute('data-cl');
  g.addEventListener('mouseenter', function(){ peek(k); });
  g.addEventListener('mouseleave', unpeek);
  g.addEventListener('click', function(ev){ ev.stopPropagation(); toggleIso(k); });
});
var cbtn = byId('panel-close'); if(cbtn){ cbtn.addEventListener('click', closePanel); }
if(status){ status.addEventListener('click', function(){ resetIso(); closePanel(); }); }
var bg = byId('bg'); if(bg){ bg.addEventListener('click', function(){ resetIso(); closePanel(); }); }
document.addEventListener('keydown', function(ev){ if(ev.key === 'Escape' || ev.keyCode === 27){ closePanel(); resetIso(); hideTip(); } });
})();</script>
