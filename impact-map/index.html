<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product Impact Map - FY26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box}
:root{
 --ink:#0f172a; --sec:#475569; --muted:#94a3b8; --hair:#e2e8f0; --canvas:#f8fafc; --surface:#ffffff;
 --ai:#4f46e5; --cost:#0891b2; --rev:#d97706; --integ:#2563eb; --exp:#db2777; --data:#16a34a;
 --r:12px; --sp:8px;
 --sh:0 1px 2px rgba(15,23,42,.06), 0 8px 24px -12px rgba(15,23,42,.12);
 --sh-lg:0 2px 4px rgba(15,23,42,.06), 0 24px 48px -16px rgba(15,23,42,.22);
 --t:150ms cubic-bezier(.4,0,.2,1);
 --f:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
html,body{margin:0;height:100%}
body{font-family:var(--f);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45}
button{font-family:inherit}
a{color:var(--integ);text-decoration:none}
a:hover{text-decoration:underline}
.app{display:flex;flex-direction:column;height:100vh;min-height:0}

/* ---- top header ---- */
.top{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--hair);flex:0 0 auto;z-index:20}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo-dot{width:30px;height:30px;border-radius:9px;flex:0 0 auto;background:conic-gradient(from 210deg,var(--ai),var(--exp),var(--rev),var(--data),var(--integ),var(--cost),var(--ai));box-shadow:inset 0 0 0 5px #fff}
.brand h1{margin:0;font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.brand .sub{margin:1px 0 0;font-size:12px;color:var(--muted);font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpis{display:flex;align-items:center;gap:6px;flex:0 0 auto}
.kpi{padding:4px 14px;text-align:right;border-left:1px solid var(--hair)}
.kpi:first-child{border-left:none}
.kpi-v{font-size:18px;font-weight:700;color:var(--ink);line-height:1.1;font-variant-numeric:tabular-nums}
.kpi-l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.how-btn{margin-left:10px;border:1px solid var(--hair);background:var(--surface);color:var(--sec);font-size:12.5px;font-weight:600;border-radius:999px;padding:8px 15px;cursor:pointer;transition:all var(--t);display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.how-btn::before{content:"";width:15px;height:15px;border-radius:50%;border:1.5px solid currentColor;background:radial-gradient(circle at 50% 34%,currentColor 0 1.2px,transparent 1.3px);opacity:.75}
.how-btn:hover{border-color:var(--ai);color:var(--ai);box-shadow:var(--sh)}

/* ---- body layout ---- */
.body{display:flex;flex:1 1 auto;min-height:0;position:relative}
.rail{flex:0 0 268px;width:268px;background:var(--surface);border-right:1px solid var(--hair);display:flex;flex-direction:column;min-height:0;transition:width var(--t),flex-basis var(--t);z-index:10}
.body.collapsed .rail{flex-basis:0;width:0;overflow:hidden;border-right:none}
.rail-top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px}
.rail-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--sec)}
.rail-collapse{border:none;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;width:26px;height:26px;border-radius:7px;line-height:1;transition:all var(--t)}
.rail-collapse:hover{background:var(--canvas);color:var(--ink)}
.rail-scroll{flex:1 1 auto;overflow-y:auto;padding:0 18px 8px}
.search-wrap{position:relative;margin-bottom:12px}
.search{width:100%;border:1px solid var(--hair);border-radius:10px;padding:9px 12px 9px 32px;font-size:13px;color:var(--ink);background:var(--canvas) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>") 10px center no-repeat;transition:all var(--t)}
.search:focus{outline:none;border-color:var(--ai);background-color:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.facet{border-top:1px solid var(--hair);padding:10px 0}
.facet:first-child{border-top:none}
.facet-h{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:3px 0;user-select:none}
.facet-h span:first-child{font-size:12px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.facet-caret{color:var(--muted);font-size:15px;transition:transform var(--t)}
.facet.open .facet-caret{transform:rotate(90deg)}
.facet-opts{display:none;margin-top:6px}
.facet.open .facet-opts{display:block}
.opt{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:8px;cursor:pointer;transition:background var(--t)}
.opt:hover{background:var(--canvas)}
.opt input{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid #cbd5e1;border-radius:5px;flex:0 0 auto;cursor:pointer;position:relative;transition:all var(--t);background:#fff}
.opt input:checked{background:var(--ai);border-color:var(--ai)}
.opt input:checked::after{content:"";position:absolute;left:4.5px;top:1.5px;width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.opt input:focus-visible{outline:2px solid rgba(79,70,229,.5);outline-offset:1px}
.opt-l{flex:1 1 auto;font-size:12.5px;color:var(--sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opt-c{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.dot.sm{width:9px;height:9px}
.rail-foot{flex:0 0 auto;padding:12px 18px;border-top:1px solid var(--hair)}
.clear-btn{width:100%;border:1px solid var(--hair);background:var(--surface);color:var(--sec);font-size:12.5px;font-weight:600;border-radius:9px;padding:9px;cursor:pointer;transition:all var(--t)}
.clear-btn:hover{border-color:#cbd5e1;background:var(--canvas);color:var(--ink)}
.rail-open{position:absolute;top:14px;left:14px;z-index:12;border:1px solid var(--hair);background:var(--surface);color:var(--sec);font-size:12.5px;font-weight:600;border-radius:9px;padding:8px 13px;cursor:pointer;box-shadow:var(--sh);display:inline-flex;gap:8px;align-items:center}
.rail-open:hover{color:var(--ink)}

/* ---- canvas ---- */
.canvas{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;min-height:0}
.canvas-bar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 22px;flex-wrap:wrap}
.legend{display:flex;flex-wrap:wrap;gap:6px}
.leg{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--hair);background:var(--surface);border-radius:999px;padding:5px 11px 5px 9px;font-size:12px;font-weight:500;color:var(--sec);cursor:pointer;transition:all var(--t)}
.leg:hover{border-color:#cbd5e1;box-shadow:var(--sh)}
.leg.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.leg.on .leg-n{color:#fff}
.summary{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;font-size:12.5px;color:var(--sec)}
.sum-count b{color:var(--ink);font-weight:700}
.fchip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--hair);border-radius:999px;padding:4px 6px 4px 11px;font-size:11.5px;color:var(--sec);cursor:pointer;transition:all var(--t)}
.fchip:hover{border-color:#cbd5e1}
.fchip .x{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:var(--canvas);color:var(--muted);font-size:12px;line-height:1}
.fchip:hover .x{background:#fee2e2;color:#dc2626}
.sum-clear{border:none;background:transparent;color:var(--ai);font-size:12px;font-weight:600;cursor:pointer;padding:4px 6px;border-radius:7px}
.sum-clear:hover{background:rgba(79,70,229,.08)}
.stage{flex:1 1 auto;min-height:0;position:relative;padding:2px 18px 14px}
#canvas-svg{display:block;width:100%;height:100%;font-family:var(--f)}
#canvas-svg text{font-family:var(--f)}

/* ---- svg layers: interactive bubbles are the TOP paint layer; everything
   decorative sits in #bg-layer which never captures pointer events ---- */
#bg-layer{pointer-events:none}
.measurer{pointer-events:none}
.bubble-g{cursor:pointer;transition:opacity var(--t)}
.bubble-g .bubble{transition:stroke var(--t),stroke-width var(--t)}
.bubble-g .ring{opacity:0;transition:opacity var(--t)}
.bubble-g:hover{filter:drop-shadow(0 3px 7px rgba(15,23,42,.16))}
.bubble-g:hover .bubble{stroke:var(--ac);stroke-width:1.8}
.bubble-g.sel .bubble{stroke:var(--ac);stroke-width:2.4}
.bubble-g.sel .ring{opacity:.5}
.bubble-g.dim{opacity:.1;pointer-events:none}   /* filtered-out: dimmed AND unclickable */
.cl-rim{transition:opacity var(--t)}
.cl-rim.dim{opacity:.12}
.blab{-webkit-user-select:none;user-select:none;pointer-events:none}

/* ---- tooltip: fixed + never captures pointer events ---- */
.tip{position:fixed;z-index:80;pointer-events:none;max-width:288px;background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh-lg);opacity:0;transform:translateY(3px);transition:opacity var(--t),transform var(--t);font-size:12.5px}
.tip.show{opacity:1;transform:none}
.tt-th{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--sec);margin-bottom:4px}
.tt-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3;margin-bottom:6px}
.tt-tag{display:inline-block;font-size:10px;font-weight:600;border-radius:6px;padding:1px 7px;margin-bottom:6px}
.tt-row{color:var(--sec);margin-bottom:2px}.tt-row b{color:var(--ink);font-weight:700}
.tt-ini{color:var(--muted);font-size:11.5px;margin-top:4px}

/* ---- drawer: display:none when closed (cannot cover / swallow the canvas) ---- */
.drawer{position:absolute;top:0;right:0;height:100%;width:432px;max-width:92%;background:var(--surface);border-left:1px solid var(--hair);box-shadow:var(--sh-lg);transform:translateX(102%);transition:transform 220ms cubic-bezier(.4,0,.2,1);z-index:40;display:none;flex-direction:column;min-height:0}
.drawer.open{transform:none}
.drawer-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border:none;background:var(--canvas);border-radius:50%;color:var(--sec);font-size:19px;line-height:1;cursor:pointer;z-index:2;transition:all var(--t)}
.drawer-close:hover{background:var(--hair);color:var(--ink)}
.drawer-in{overflow-y:auto;padding:22px 24px 32px}
.d-theme{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:600;color:var(--sec);margin-bottom:8px}
.badge{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sec);background:var(--canvas);border:1px solid var(--hair);border-radius:6px;padding:2px 6px}
.d-name{font-size:22px;font-weight:700;line-height:1.22;margin:0 40px 10px 0}
.d-tag{display:inline-block;font-size:11px;font-weight:600;border:1px solid;border-radius:7px;padding:2px 9px;margin-bottom:14px}
.d-value{font-size:13px;color:var(--sec);margin-bottom:14px}
.d-value b{font-size:17px;color:var(--ink)}
.d-value .d-sub{color:var(--muted);font-size:11.5px}
.d-stats{display:flex;gap:8px;margin-bottom:14px}
.d-stat{flex:1;background:var(--canvas);border-radius:10px;padding:10px 12px}
.d-statv{font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.d-statl{font-size:10.5px;color:var(--muted);margin-top:2px}
.d-field{margin-bottom:12px}
.d-lab{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.d-val{font-size:13px;color:var(--ink)}
.link-btn{border:none;background:transparent;color:var(--ai);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px}
.link-btn:hover{text-decoration:underline}
.d-listhead{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--sec);padding:12px 0 8px;border-top:1px solid var(--hair)}
.d-list{display:flex;flex-direction:column;gap:8px}
.s-row{border:1px solid var(--hair);border-radius:10px;overflow:hidden;transition:box-shadow var(--t),border-color var(--t)}
.s-row:hover{border-color:#cbd5e1}
.s-row.open{box-shadow:var(--sh);border-color:#cbd5e1}
.s-head{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer}
.s-status{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.s-status.ship{background:var(--data)}
.s-status.prog{background:var(--rev)}
.s-key{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums;flex:0 0 auto}
.s-sum{flex:1 1 auto;font-size:12.5px;color:var(--sec);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-score{font-size:12px;font-weight:700;color:var(--ink);background:var(--canvas);border-radius:6px;padding:2px 8px;font-variant-numeric:tabular-nums;flex:0 0 auto}
.s-caret{color:var(--muted);font-size:16px;transition:transform var(--t);flex:0 0 auto}
.s-row.open .s-caret{transform:rotate(90deg)}
.s-body{display:none;padding:2px 14px 15px;border-top:1px solid var(--hair)}
.s-row.open .s-body{display:block}
.sd-break{background:linear-gradient(180deg,#f8fafc,#fff);border:1px solid var(--hair);border-radius:10px;padding:11px 13px;margin:13px 0}
.sd-blab{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}
.sd-bval{font-size:13px;font-weight:600;color:var(--ink);line-height:1.5}
.sd-bnote{font-size:11px;color:var(--muted);margin-top:5px}
.sd-narr{margin-bottom:11px}
.sd-nlab{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:2px}
.sd-ntext{font-size:12.5px;color:var(--ink);line-height:1.5}
.sd-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 14px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--hair)}
.sd-f dt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.sd-f dd{margin:1px 0 0;font-size:12px;color:var(--ink);word-break:break-word}

/* ---- methodology modal + scrim: display:none when closed ---- */
.scrim{position:fixed;inset:0;background:rgba(15,23,42,.32);z-index:90;opacity:0;transition:opacity var(--t);display:none}
.scrim.show{opacity:1}
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;opacity:0;transition:opacity var(--t)}
.modal.open{opacity:1}
.modal-card{position:relative;background:var(--surface);border-radius:16px;box-shadow:var(--sh-lg);max-width:720px;width:100%;max-height:88vh;overflow-y:auto;padding:30px 34px;transform:translateY(8px) scale(.99);transition:transform var(--t)}
.modal.open .modal-card{transform:none}
.modal-x{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;background:var(--canvas);border-radius:50%;color:var(--sec);font-size:20px;cursor:pointer;line-height:1}
.modal-x:hover{background:var(--hair);color:var(--ink)}
.modal-card h2{font-size:24px;font-weight:700;margin:0 0 6px}
.m-formula{font-size:15px;font-weight:600;color:var(--ai);background:var(--canvas);border:1px solid var(--hair);border-radius:10px;padding:11px 15px;margin:12px 0}
.m-lead{font-size:13.5px;color:var(--sec);line-height:1.6;margin:0 0 18px}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.m-table{border:1px solid var(--hair);border-radius:12px;padding:14px 16px;background:var(--surface)}
.m-tt{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink);margin-bottom:8px}
.m-table table{width:100%;border-collapse:collapse}
.m-table td{padding:5px 0;font-size:13px;color:var(--sec);border-bottom:1px solid var(--canvas)}
.m-table tr:last-child td{border-bottom:none}
.m-w{text-align:right;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.m-note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4}
.m-eg{font-size:12.5px;color:var(--sec);background:var(--canvas);border-radius:10px;padding:12px 15px;margin-top:18px;line-height:1.55}
.m-eg b{color:var(--ink)}

@media (max-width:900px){
 .kpi:nth-child(3),.kpi:nth-child(4){display:none}
 .brand .sub{display:none}
 .m-grid,.sd-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="logo-dot" aria-hidden="true"></div>
      <div>
        <h1 id="brandTitle">Product Impact Map</h1>
        <p class="sub" id="brandSub">Everything shipped in FY26, sized by assessed business value</p>
      </div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="kpi-v" id="kpiStories">0</div><div class="kpi-l">Stories</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiValue">0</div><div class="kpi-l">Assessed value</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiThemes">0</div><div class="kpi-l">Themes</div></div>
      <div class="kpi"><div class="kpi-v" id="kpiShipped">0%</div><div class="kpi-l">Shipped</div></div>
      <button class="how-btn" id="howBtn" aria-haspopup="dialog">How value is scored</button>
    </div>
  </header>
  <div class="body" id="body">
    <aside class="rail" id="rail" aria-label="Filters">
      <div class="rail-top">
        <span class="rail-title">Filters</span>
        <button class="rail-collapse" id="railCollapse" aria-label="Collapse filters" title="Collapse">&#8249;</button>
      </div>
      <div class="rail-scroll">
        <div class="search-wrap">
          <input id="search" class="search" type="search" placeholder="Search stories, keys, summaries" aria-label="Search stories">
        </div>
        <div id="facets"></div>
      </div>
      <div class="rail-foot"><button class="clear-btn" id="clearAll">Clear all filters</button></div>
    </aside>
    <button class="rail-open" id="railOpen" aria-label="Show filters" hidden>&#9776; Filters</button>
    <main class="canvas">
      <div class="canvas-bar">
        <div class="legend" id="legend"></div>
        <div class="summary" id="summary"></div>
      </div>
      <div class="stage" id="stage">
        <svg id="canvas-svg" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Product Impact Map FY26"></svg>
      </div>
    </main>
    <aside class="drawer" id="drawer" role="dialog" aria-label="Epic detail" aria-hidden="true">
      <button class="drawer-close" id="drawerClose" aria-label="Close detail">&#215;</button>
      <div class="drawer-in" id="drawerBody"></div>
    </aside>
  </div>
</div>
<div class="scrim" id="scrim"></div>
<div class="modal" id="methodologyModal" role="dialog" aria-modal="true" aria-label="How value is scored" aria-hidden="true">
  <div class="modal-card" id="methodologyCard"></div>
</div>

-53978","link":"https://expoplatform.atlassian.net/browse/EP-53978","epic":"IMEX GDPR Requirements","initiative":"Privacy, GDPR & Compliance - trust by default","team":"Exhibitor team","productArea":"Networking and Interactions, Favourites, Favourites action","taskSize":"L task (5-15 days)","size":"L","rgto":"Grow","created":"2026-05-29","resolved":"-","status":"In Progress","tip":939.0,"spent":24.0,"tracked":"No","month":"2026-05","quarter":"2026-Q2","q":"Q2","reportedBy":"IMEX","jpd":"-","summary":"Lets privacy-opted-out attendees favourite exhibitors, products and people fully anonymously, satisfying strict GDPR (notably Germany/IMEX) expectations while still hinting interest to the other party via a combined, tooltip-explained counter.","problem":"Opting out of networking disabled all engagement including favouriting, and any favourite made an attendee visible to third parties, leaving no way to bookmark content privately and creating GDPR risk for privacy-sensitive markets like Germany.","why":"Compliance Requirement - GDPR-driven privacy requirement tied to IMEX and German data-protection expectations.","outcome":"Opted-out users can favourite/unfavourite on web and app with the action kept out of notifications, the interaction dashboard, downloaded leads and the public API, never counted as a lead, preserved even if the user later opts in, plus tooltips clarifying that favourite counts may include anonymous opt-out favourites.","impactArea":"Compliance","impactCats":["Compliance","Client Commitment","UX"],"driver":"Compliance Requirement","benefit":"GDPR-compliant private engagement that removes a trust/legal blocker for privacy-strict clients and events while retaining engagement signals.","beneficiary":"Attendee","strategicTheme":"Customer Experience","storyType":"Enhancement","businessValue":"High","confScore":"High","tier":"Enterprise / Large","reach":"Broad","impact":["Retention","Adoption"],"impMax":"Retention","conf":"Estimated","score":112,"breakdown" s, reducing launch risk.","beneficiary":"Entire Platform","strategicTheme":"Scalability","storyType":"Infrastructure","businessValue":"Medium","confScore":"High","tier":"Strategic","reach":"Platform-wide","impact":["Risk Reduction"],"impMax":"Risk Reduction","conf":"Estimated","score":160,"breakdown":"Strategic (10) x Platform-wide (5) x Risk Reduction (4) x Estimated (0.8) = 160","cl":"INTEG","evidence":["Incident reports","Engineering effort logs"],"hyp":"Bet (for every event on the platform): A highly available search service with known capacity limits and predictable running costs, reducing launch risk. Why now: Reliability phase of the Search & Discovery initiative to ensure the service is resilient and its economics understood (Scalability Initiative / Platform Health). Leading signal: fewer incidents & lower platform risk.","goal":"Goal: The Search API now runs across two AWS availability zones, load testing was completed with Locust, and a monthly cost estimate covering AWS, OpenAI\u2026 (to reduce risk & harden the platform)."},{"key":"EP-53519","link":"https://expoplatform.atlassian.net/browse/EP-53519","epic":"Platform Performance & Operational Efficiency 2026","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability","team":"Not Clearly Specified","productArea":"Networking and Interactions, Messaging","taskSize":"L task (5-15 days)","size":"L","rgto":"Transform","created":"2026-05-18","resolved":"-","status":"In Progress","tip":769.2,"spent":24.0,"tracked":"No","month":"2026-05","quarter":"2026-Q2","q":"Q2","reportedBy":"Not Clearly Specified","jpd":"-","summary":"Re-architects the email pipeline for resilience - isolating transactional from marketing streams, adding per-client (tenant) isolation, ingress email validation and a per-client rate-limit kill-switch - to stop one bad sender taking down platform-wide email.","problem":"All email shared one SES pipeline, so a single client's invalid addresses could trip the aggregate-bounce Lambda kill-switch and halt email delivery platform-wide; transactional mail shared the path with bulk marketing; and no validation existed at ingress - a stakeholder flagged this as existential revenue risk.","why":"Platform Health - flagged as highest priority by the stakeholder citing existential business risk and ongoing revenue loss ('without emails the platform does not exist').","outcome":"Design and build toward two isolated SES streams, per-tenant tracking/throttle/pause, ingress email validation (RFC-5322, MX, blocklist, suppression) and a per-client kill-switch replacing the platform-wide cutoff, with alerting and a runbook.","impactArea":"Scalability","impactCats":["Scalability","Infrastructure","Revenue Enabler","Technical Debt Reduction","Operational Efficiency"],"driver":"Platform Health","benefit":"Eliminates platform-wide email outages caused by one tenant, protects transactional delivery and revenue, and stops paying for invalid sends.","beneficiary":"Entire Platform","strategicTheme":"Scalability","storyType":"Infrastructure","businessValue":"High","confScore":"High","tier":"Strategic","reach":"Platform-wide","impact":["Risk Reduction","Cost Reduction"],"impMax":"Risk Reduction","conf":"Estimated","score":160,"breakdown":"Strategic (10) x Platform-wide (5) x Risk Reduction (4) x Estimated (0.8) = 160","cl":"INTEG","evidence":["Incident reports","Engineering effort logs"],"hyp":"Bet (for every event on the platform): Eliminates platform-wide email outages caused by one tenant, protects transactional delivery and revenue, and stops paying for invalid sends. Why now: Platform Health - flagged as highest priority by the stakeholder citing existential business risk and ongoing revenue loss ('without emails the platform does not exist'). Leading signal: fewer incidents & lower platform risk.","goal":"Goal: Design and build toward two isolated SES streams, per-tenant tracking/throttle/pause, ingress email validation (RFC-5322, MX, blocklist, suppression)\u2026 (to reduce risk & harden the platform)."},{"key":"EP-54438","link":"https://expoplatform.atlassian.net/browse/EP-54438","epic":"Platform Performance & Operational Efficiency 2026","initiative":"Scalability & Operational Efficiency - scale to more events with less effort and higher reliability","team":"Data Science","productArea":"Not Clearly Specified","taskSize":"L task (5-15 days)","size":"L","rgto":"Grow","created":"2026-06-11","resolved":"-","status":"In Progress","tip":198.9,"spent":36.2,"tracked":"Yes","month":"2026-06","quarter":"2026-Q2","q":"Q2","reportedBy":"Not Clearly Specified","jpd":"-","summary":"The recommendation/inference service's caching layer was reworked - incremental updates, async data pulls, compression and SLO/SLI wiring - to remove the production bottleneck identified in event data analysis.","problem":"Production analysis (EP-54048) found the cache to be the main bottleneck of the inference service: full data collection on each request and on-request data pulls were limiting performance and reliability under load.","why":"Platform Health / Scalability Initiative - first phase of a rollout plan (EP-54244) to make the recommendation service performant and observable enough to scale with production traffic.","outcome":"Phase one caching improvements: incremental row updates instead of full collection, asynchronous data pulls, cache data compression, and SLO/SLI instrumentation for the service.","impactArea":"Scalability","impactCats":["Scalability","Operational Efficiency","Infrastructure","Data & Analytics"],"driver":"Platform Health","benefit":"Lower latency and higher reliability for recommendations at scale, plus measurable service-level objectives to guide future optimisation.","beneficiary":"Entire Platform","strategicTheme":"Scalability","storyType":"Enhancement","businessValue":"High","confScore":"High","tier":"Strategic","reach":"Platform-wide","impact":["Risk Reduction","Cost Reduction"],  toggle synced to the category by default, with 'Set custom' (exhibitor-level value, higher priorit\u2026 (to grow revenue)."}]},{"id":39,"name":"Admin Panel Restructure & Navigation","label":"Admin Navigation","themeKey":"REV","color":"#d97706","value":495,"storyCount":7,"shipped":7,"initiative":"Client Manager Redesign + Onboarding + Admin Panel Redesign","tag":"7 shipped","stories":[{"key":"EP-50051","link":"https://expoplatform.atlassian.net/browse/EP-50051","epic":"Admin Panel Restructure & Navigation","initiative":"Client Manager Redesign + Onboarding + Admin Panel Redesign","team":"Exhibitor team","productArea":"Sponsorship","taskSize":"M task (3-5 days)","size":"M","rgto":"Grow","created":"2026-03-04","resolved":"2026-06-09","status":"Shipped","tip":2107.9,"spent":69.3,"tracked":"Yes","month":"2026-06","quarter":"2026-Q2","q":"Q2","reportedBy":"IMEX","jpd":"https://expoplatform.atlassian.net/browse/PBV11-182","summary":"Sponsors and sponsored products can now be displayed in randomized order on the web platform, giving every paying sponsor fairer visibility rotation.","problem":"Sponsor and sponsored-product placement was fixed, so the same sponsors always appeared first, creating unequal exposure among paying sponsors.","why":"Revenue Opportunity / Customer Request - fair sponsor rotation strengthens the sponsorship product that organizers monetise.","outcome":"A random sorting mode was added for Sponsors and Sponsored Products so their display order is shuffled rather than fixed by priority.","impactArea":"Revenue Enabler","impactCats":["Revenue Enabler","UX"],"driver":"Revenue Opportunity","benefit":"More equitable sponsor visibility, supporting sponsorship revenue and sponsor satisfaction.","beneficiary":"Customer","strategicTheme":"Revenue Growth","storyType":"Enhancement","businessValue":"Medium","confScore":"Medium","tier":"Enterprise / Large","reach":"Broad","impact":["Revenue"],"impMax":"Revenue","conf":"Estimated","score":112,"breakdown":"Enterpris :"Customer","strategicTheme":"Revenue Growth","storyType":"Enhancement","businessValue":"Medium","confScore":"High","tier":"Mid-Market","reach":"Broad","impact":["Revenue"],"impMax":"Revenue","conf":"Estimated","score":64,"breakdown":"Mid-Market (4) x Broad (4) x Revenue (5) x Estimated (0.8) = 64","cl":"REV","evidence":[],"hyp":"","goal":""},{"key":"EP-48874","link":"https://expoplatform.atlassian.net/browse/EP-48874","epic":"Admin Panel Restructure & Navigation","initiative":"Client Manager Redesign + Onboarding + Admin Panel Redesign","team":"Organizer team","productArea":"Client Manager","taskSize":"M task (3-5 days)","size":"M","rgto":"Grow","created":"2026-02-03","resolved":"2026-06-12","status":"Shipped","tip":2528.3,"spent":42.2,"tracked":"Yes","month":"2026-06","quarter":"2026-Q2","q":"Q2","reportedBy":"Not Clearly Specified","jpd":"https://expoplatform.atlassian.net/browse/PBV11-127","summary":"A persistent, non-blocking banner now warns admins not to edit an event while it is being cloned, eliminating a recurring source of data corruption.","problem":"Event cloning gave no visible signal in the Admin Panel, so organizers edited source events mid-clone and repeatedly produced inconsistent, broken event setups.","why":"Operational Efficiency - the cloning data-inconsistency bug recurred frequently and needed a system-level user warning to prevent it.","outcome":"A fixed informational banner is shown across all Admin Panel module pages of the source event while cloning runs, telling users not to make changes until it completes.","impactArea":"Operational Efficiency","impactCats":["Operational Efficiency","UX","Maintenance"],"driver":"Platform Health","benefit":"Fewer corrupted clones and support escalations, and more reliable event setup for organizers running co-located or repeat events.","beneficiary":"Event Organizer","strategicTheme":"Operational Excellence","storyType":"Enhancement","businessValue":"Medium","confScore":"High","tier":"Mid-Market","reach" pped","count":186},{"v":"In Progress","label":"In Progress","count":56}],"open":true},{"k":"bv","label":"Business value","opts":[{"v":"High","label":"High","count":28},{"v":"Medium","label":"Medium","count":177},{"v":"Low","label":"Low","count":37}],"open":true},{"k":"impact","label":"Impact type","opts":[{"v":"Revenue","label":"Revenue","count":24},{"v":"Retention","label":"Retention","count":51},{"v":"Risk Reduction","label":"Risk Reduction","count":127},{"v":"Adoption","label":"Adoption","count":77},{"v":"Cost Reduction","label":"Cost Reduction","count":79}],"open":true},{"k":"rgto","label":"RGT+O","opts":[{"v":"Run","label":"Run","count":80},{"v":"Grow","label":"Grow","count":132},{"v":"Transform","label":"Transform","count":25},{"v":"Organization","label":"Organization","count":3},{"v":"Not Clearly Specified","label":"Not Clearly Specified","count":2}],"open":false},{"k":"team","label":"Team","opts":[{"v":"Integration team","label":"Integration team","count":77},{"v":"Data Science","label":"Data Science","count":52},{"v":"Exhibitor team","label":"Exhibitor team","count":40},{"v":"Visitor team","label":"Visitor team","count":32},{"v":"Organizer team","label":"Organizer team","count":25},{"v":"Mobile team","label":"Mobile team","count":13},{"v":"Not Clearly Specified","label":"Not Clearly Specified","count":2},{"v":"QA","label":"QA","count":1}],"open":false},{"k":"quarter","label":"Quarter","opts":[{"v":"Q1","label":"Q1","count":54},{"v":"Q2","label":"Q2","count":187},{"v":"Q3","label":"Q3","count":1}],"open":false},{"k":"size","label":"Task size","opts":[{"v":"XS","label":"XS","count":9},{"v":"S","label":"S","count":90},{"v":"M","label":"M","count":73},{"v":"L","label":"L","count":31},{"v":"XL","label":"XL","count":6},{"v":"XXL","label":"XXL","count":4},{"v":"Not specified","label":"Not specified","count":29}],"open":false}],"weights":{"tier":{"Strategic":10,"Enterprise / Large":7,"Mid-Market":4,"SMB":2,"Internal Only":1},"reach":{"Individual":1,"Limited":2,"Moderate":3,"Broad":4,"Platform-wide":5},"impact":{"Revenue":5,"Retention":5,"Risk Reduction":4,"Adoption":3,"Cost Reduction":3},"conf":{"Measured":1.0,"Estimated":0.8,"Assumed":0.5}}}</script>
<script>(function(){
"use strict";
if(typeof d3==='undefined'){ console.error('D3 failed to load'); return; }
var D = JSON.parse(document.getElementById('data').textContent);

/* ---- indices ---- */
var THEMES={}; D.themes.forEach(function(t){ THEMES[t.key]=t; });
var EPICS=D.epics;
var EPIC_BY_ID={}; EPICS.forEach(function(e){ EPIC_BY_ID[e.id]=e; });
var CLUSTER_EPICS={};
EPICS.forEach(function(e){ (CLUSTER_EPICS[e.themeKey]=CLUSTER_EPICS[e.themeKey]||[]).push(e.id); });
var STORIES=[];
EPICS.forEach(function(e){ e.stories.forEach(function(s){ s._eid=e.id; STORIES.push(s); }); });
var FLABEL={}; D.facets.forEach(function(f){ FLABEL[f.k]={}; f.opts.forEach(function(o){ FLABEL[f.k][o.v]=o.label; }); });

/* ---- state ---- */
var F={ search:'', facets:{} };
D.facets.forEach(function(f){ F.facets[f.k]=[]; });
var selectedId=null;

/* ---- layout state (computed by D3) ---- */
var CL_UNIT={};      /* per-cluster unit packing: {R, pos:{id:{ux,uy,ur}}} */
var CL_POS={};       /* per-cluster world placement: {cx,cy,R} */
var K=1;             /* global scale: radius = K * sqrt(value) */
var WORLD={w:1280,h:720};
var LAYOUT_AXIS={}, LAYOUT_VS={};
var presentKeys=[];

/* ---- constants (world units) ---- */
var TW=1280, MARGIN=48, TITLE_BAND=30, GAPX=48, GAPY=64, LABEL_PAD=9;
var LBL_Y1=0.64, LBL_Y2=1.12;

/* ---- dom helpers ---- */
function byId(id){ return document.getElementById(id); }
function setText(id,v){ var n=byId(id); if(n) n.textContent=v; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ try{ return Number(n||0).toLocaleString('en-US'); }catch(e){ return String(n); } }
function fmtConf(v){ return Number(v).toFixed(1); }
function debounce(fn,ms){ var t; return function(){ var a=arguments,c=this; clearTimeout(t); t=setTimeout(function(){ fn.apply(c,a); },ms); }; }

var svg=d3.select('#canvas-svg');
var svgNode=svg.node();
var gBg=svg.append('g').attr('id','bg-layer').attr('pointer-events','none');      /* painted first (behind) */
var gBubbles=svg.append('g').attr('id','bubble-layer');                            /* painted last (topmost, interactive) */
var measurer=svg.append('text').attr('class','measurer').attr('x',-9999).attr('y',-9999)
              .attr('pointer-events','none').style('visibility','hidden');
var tip=byId('tip'), drawer=byId('drawer'), drawerBody=byId('drawerBody');
var modal=byId('methodologyModal'), modalCard=byId('methodologyCard'), scrim=byId('scrim');
var legend=byId('legend'), facetsEl=byId('facets'), summary=byId('summary'), stageEl=byId('stage');
var drawerTimer=null, modalTimer=null;

/* ================= LAYOUT (D3 pack per cluster + responsive grid) ================= */
function packUnit(){
  /* pack each present cluster at unit scale (radius = sqrt(value)); positions are
     scale-invariant so we cache them once and multiply by K later. */
  presentKeys.forEach(function(k){
    var ids=CLUSTER_EPICS[k]||[]; if(!ids.length) return;
    var circles=ids.map(function(id){ return { r:Math.sqrt(Math.max(EPIC_BY_ID[id].value,1e-6)), id:id }; });
    d3.packSiblings(circles);
    var enc=d3.packEnclose(circles);
    var pos={};
    circles.forEach(function(c){ pos[c.id]={ ux:c.x-enc.x, uy:c.y-enc.y, ur:c.r }; });
    CL_UNIT[k]={ R:enc.r, pos:pos };
  });
}

function computeLayout(paneW,paneH){
  var keys=presentKeys, n=keys.length;
  var aspect=(paneW>0&&paneH>0)?paneW/paneH:16/9;
  var rows = n<=1?1 : (aspect>=2.05?1 : (aspect>=1.05?2 : 3));
  rows=Math.min(rows,n);
  var cols=Math.ceil(n/rows);
  var grid=[]; for(var i=0;i<n;i+=cols){ grid.push(keys.slice(i,i+cols)); }
  var contentW=TW-2*MARGIN;

  /* choose global scale K so the widest row fits, capped so no cluster is huge */
  var k=Infinity;
  grid.forEach(function(row){
    var unitSpan=0; row.forEach(function(kk){ unitSpan+=2*CL_UNIT[kk].R; });
    var avail=contentW-GAPX*(row.length-1);
    if(unitSpan>0) k=Math.min(k, avail/unitSpan);
  });
  var maxUR=0; keys.forEach(function(kk){ maxUR=Math.max(maxUR,CL_UNIT[kk].R); });
  if(maxUR>0) k=Math.min(k, 250/maxUR);
  if(!isFinite(k)||k<=0) k=1;
  K=k;

  /* value-scale reference circles share K; the bottom band must fit them */
  var rr=D.meta.ref.map(function(v){ return K*Math.sqrt(Math.max(v,1e-6)); });
  var vsMaxR=rr[rr.length-1]||10;
  var BOTTOM_BAND=Math.max(100, 2*vsMaxR+72);

  var rowHeights=grid.map(function(row){ var mx=0; row.forEach(function(kk){ mx=Math.max(mx,CL_UNIT[kk].R); }); return 2*K*mx; });
  var contentH=rowHeights.reduce(function(a,b){ return a+b; },0)+GAPY*(grid.length-1);
  var worldH=TITLE_BAND+contentH+BOTTOM_BAND;
  WORLD={ w:TW, h:worldH };

  var y=TITLE_BAND;
  CL_POS={};
  grid.forEach(function(row,ri){
    var rowW=0; row.forEach(function(kk){ rowW+=2*K*CL_UNIT[kk].R; }); rowW+=GAPX*(row.length-1);
    var x=MARGIN+(contentW-rowW)/2;
    var rowMaxR=rowHeights[ri]/2;
    row.forEach(function(kk){
      var R=K*CL_UNIT[kk].R, cx=x+R, cy=y+rowMaxR;
      CL_POS[kk]={ cx:cx, cy:cy, R:R };
      var pos=CL_UNIT[kk].pos;
      (CLUSTER_EPICS[kk]||[]).forEach(function(id){
        var e=EPIC_BY_ID[id], p=pos[id];
        e._x=cx+K*p.ux; e._y=cy+K*p.uy; e._r=K*p.ur;
      });
      x+=2*R+GAPX;
    });
    y+=rowHeights[ri]+GAPY;
  });

  /* value scale bottom-right */
  var vgap=18, totw=0; rr.forEach(function(r){ totw+=2*r; }); totw+=vgap*(rr.length-1);
  var vsX0=TW-MARGIN-totw;
  var baseY=worldH-30;
  var circles=[], cx2=vsX0;
  for(var j=0;j<rr.length;j++){ var r=rr[j]; circles.push({ cx:cx2+r, cy:baseY-r, r:r, label:fmt(D.meta.ref[j]) }); cx2+=2*r+vgap; }
  LAYOUT_VS={ x0:vsX0, capY:baseY-2*vsMaxR-8, labelY:baseY+14, circles:circles };

  /* time axis under the clusters, stopping before the value scale */
  var axY=TITLE_BAND+contentH+30;

/* ================= BUBBLES (top interactive layer) ================= */
function measure(t,fs){ measurer.style('font-size',fs+'px').style('font-weight','500').text(t); return measurer.node().getComputedTextLength(); }
function availW(r,fs,yf){ var yoff=fs*yf; return 2*Math.sqrt(Math.max(r*r-yoff*yoff,1))-LABEL_PAD; }
function fitLabel(label,r){
  /* real getComputedTextLength measurement; show inline label only if the COMPLETE
     label fits as 1 or 2 lines at font >= 10px, else null (never clip). */
  if(r<13) return null;
  var words=label.split(/\s+/);
  var maxfs=Math.max(10, Math.min(15, Math.round(r*0.62)));
  for(var fs=maxfs; fs>=10; fs--){
    if(fs*LBL_Y1<r && measure(label,fs)<=availW(r,fs,LBL_Y1)) return { fs:fs, lines:[label] };
    if(words.length>=2 && fs*LBL_Y2<r){
      var aw=availW(r,fs,LBL_Y2), best=null;
      for(var i=1;i<words.length;i++){
        var a=words.slice(0,i).join(' '), b=words.slice(i).join(' ');
        var w=Math.max(measure(a,fs),measure(b,fs));
        if(w<=aw){
          var joiner=/^(&|and|of|the|to|a)$/i.test(words[i-1]);
          var key=(joiner?1000:0)+Math.abs(a.length-b.length);
          if(!best||key<best.key) best={ key:key, a:a, b:b };
        }
      }
      if(best) return { fs:fs, lines:[best.a,best.b] };
    }
  }
  return null;
}
function layoutLabel(g,e){
  g.selectAll('text.blab').remove();
  var fit=fitLabel(e.label, e._r); if(!fit) return;
  var fs=fit.fs, lines=fit.lines, lh=fs*1.05, y0=e._y-(lines.length*lh)/2+fs*0.82;
  lines.forEach(function(ln,i){
    g.append('text').attr('class','blab').attr('x',e._x).attr('y',y0+i*lh).attr('text-anchor','middle')
      .attr('font-size',fs).attr('font-weight',500).attr('fill','#0f172a').text(ln);
  });
}
function renderBubbles(){
  var sel=gBubbles.selectAll('g.bubble-g').data(EPICS, function(e){ return e.id; });
  sel.exit().remove();
  var ent=sel.enter().append('g').attr('class','bubble-g').attr('data-epic',function(e){ return e.id; })
    .each(function(e){ this.style.setProperty('--ac', e.color); })

  ent.append('circle').attr('class','ring').attr('fill','none').attr('stroke',function(e){ return e.color; }).attr('stroke-width',2);
  ent.append('circle').attr('class','bubble').attr('fill','#ffffff').attr('stroke','#cbd5e1').attr('stroke-width',1.1);
  var all=ent.merge(sel);
  all.select('.ring').transition().duration(150).attr('cx',function(e){ return e._x; }).attr('cy',function(e){ return e._y; }).attr('r',function(e){ return e._r+4; });
  all.select('.bubble').transition().duration(150).attr('cx',function(e){ return e._x; }).attr('cy',function(e){ return e._y; }).attr('r',function(e){ return e._r; });
  all.each(function(e){ layoutLabel(d3.select(this), e); });

/* ================= MATCHING / FILTERS ================= */
function storyMatches(s){
  if(F.search){
    var b=(s.key+' '+s.summary+' '+s.epic+' '+s.initiative+' '+s.team+' '+(s.impactArea||'')+' '+s.storyType).toLowerCase();
    if(b.indexOf(F.search)<0) return false;
  }
  var fa=F.facets;
  if(fa.theme.length && fa.theme.indexOf(s.cl)<0) return false;
  if(fa.status.length && fa.status.indexOf(s.status)<0) return false;
  if(fa.bv.length && fa.bv.indexOf(s.businessValue)<0) return false;
  if(fa.rgto.length && fa.rgto.indexOf(s.rgto)<0) return false;
  if(fa.team.length && fa.team.indexOf(s.team)<0) return false;
  if(fa.quarter.length && fa.quarter.indexOf(s.q)<0) return false;
  if(fa.size.length && fa.size.indexOf(s.size)<0) return false;
  if(fa.impact.length){
    var hit=false;
    for(var i=0;i<s.impact.length;i++){ if(fa.impact.indexOf(s.impact[i])>=0){ hit=true; break; } }
    if(!hit) return false;
  }
  return true;
}
function anyFilter(){
  if(F.search) return true;
  for(var k in F.facets){ if(F.facets[k].length) return true; }
  return false;
}
function apply(){
  var cnt=0,val=0,ship=0,themeSet={},epicHit={},active=anyFilter();
  for(var i=0;i<STORIES.length;i++){
    var s=STORIES[i], m=storyMatches(s); s._m=m;
    if(m){ cnt++; val+=s.score; if(s.status==='Shipped')ship++; themeSet[s.cl]=1; epicHit[s._eid]=true; }
  }
  gBubbles.selectAll('g.bubble-g').classed('dim', function(e){ return active && !epicHit[e.id]; });
  presentKeys.forEach(function(k){
    var any=(CLUSTER_EPICS[k]||[]).some(function(id){ return epicHit[id]; });
    gBg.select('.cl-rim[data-cl="'+k+'"]').classed('dim', active && !any);
  });
  setText('kpiStories', fmt(cnt));
  setText('kpiValue', fmt(Math.round(val)));
  setText('kpiThemes', String(Object.keys(themeSet).length));
  setText('kpiShipped', (cnt?Math.round(ship/cnt*100):0)+'%');
  renderSummary(cnt, Object.keys(epicHit).length, Object.keys(themeSet).length);
  updateLegend();
  if(selectedId!=null) renderDrawer();
}

function moveTip(ev){
  var pad=16, tw=tip.offsetWidth||270, th=tip.offsetHeight||120;
  var x=ev.clientX+pad, y=ev.clientY+pad;
  if(x+tw>window.innerWidth-8) x=ev.clientX-tw-pad;
  if(y+th>window.innerHeight-8) y=ev.clientY-th-pad;
  if(x<8)x=8; if(y<8)y=8;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function init(){
  if(!svgNode){ return; }
  setText('brandTitle', D.meta.title||'Product Impact Map');
  setText('brandSub', D.meta.subtitle||'');
  presentKeys=(D.meta.themeOrder||[]).filter(function(k){ return (CLUSTER_EPICS[k]||[]).length; });
  packUnit();
  renderLegend(); renderFacets(); buildModal();

  /* empty-canvas click closes the drawer/selection (bubble clicks stopPropagation) */
  stageEl.addEventListener('click', function(ev){
    if(ev.target.closest && ev.target.closest('.bubble-g')) return;
    deselect(); closeDrawer();
  });

  legend.addEventListener('click', function(ev){ var b=ev.target.closest?ev.target.closest('.leg'):null; if(b) toggleFacet('theme', b.getAttribute('data-cl')); });
  legend.addEventListener('mouseover', function(ev){ var b=ev.target.closest?ev.target.closest('.leg'):null; if(b) peek(b.getAttribute('data-cl')); });
  legend.addEventListener('mouseout', function(ev){ var b=ev.target.closest?ev.target.closest('.leg'):null; if(b) unpeek(); });

  facetsEl.addEventListener('change', function(ev){
    var cb=ev.target;
    if(cb && cb.getAttribute && cb.getAttribute('type')==='checkbox'){ setFacet(cb.getAttribute('data-facet'), cb.getAttribute('data-value'), cb.checked); }
  });
  facetsEl.addEventListener('click', function(ev){
    if(ev.target.closest && ev.target.closest('.opt')) return;
    var hh=ev.target.closest?ev.target.closest('.facet-h'):null;
    if(hh) hh.parentNode.classList.toggle('open');
  });

  var sb=byId('search'); if(sb) sb.addEventListener('input', function(ev){ F.search=(ev.target.value||'').trim().toLowerCase(); apply(); });
  var ca=byId('clearAll'); if(ca) ca.addEventListener('click', clearAll);

  summary.addEventListener('click', function(ev){
    var t=ev.target;
    if(t.closest && t.closest('[data-clear]')){ clearAll(); return; }
    if(t.closest && t.closest('[data-clear-search]')){ F.search=''; var s2=byId('search'); if(s2)s2.value=''; apply(); return; }
    var ch=t.closest?t.closest('.fchip[data-facet]'):null;
    if(ch) toggleFacet(ch.getAttribute('data-facet'), ch.getAttribute('data-value'));
  });

  drawerBody.addEventListener('click', function(ev){
    if(ev.target.closest && ev.target.closest('.s-key')) return;
    if(ev.target.closest && ev.target.closest('#howBtn2')){ openModal(); return; }
    var head=ev.target.closest?ev.target.closest('.s-head'):null;
    if(head) head.parentNode.classList.toggle('open');
  });

  var dc=byId('drawerClose'); if(dc) dc.addEventListener('click', function(){ closeDrawer(); deselect(); });
  var hb=byId('howBtn'); if(hb) hb.addEventListener('click', openModal);
  if(scrim) scrim.addEventListener('click', closeModal);

  var rc=byId('railCollapse'), ro=byId('railOpen'), bodyEl=byId('body');
  if(rc) rc.addEventListener('click', function(){ bodyEl.classList.add('collapsed'); if(ro) ro.hidden=false; setTimeout(relayout,180); });
  if(ro) ro.addEventListener('click', function(){ bodyEl.classList.remove('collapsed'); ro.hidden=true; setTimeout(relayout,180); });

  document.addEventListener('keydown', function(ev){
    if(ev.key==='Escape'||ev.keyCode===27){
      if(modal.classList.contains('open')) closeModal();
      else { closeDrawer(); deselect(); hideTip(); }
    }
  });

  relayout();
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ refitAllLabels(); }); }
  window.addEventListener('resize', debounce(relayout,160));

  window.IMPACT_MAP={ state:F, apply:apply, setFacet:setFacet, toggleFacet:toggleFacet, clearAll:clearAll,
    selectEpic:selectEpic, deselect:deselect, openModal:openModal, closeModal:closeModal,
    storyMatches:storyMatches, relayout:relayout, layout:function(){ return { K:K, WORLD:WORLD, CL_POS:CL_POS }; },
    STORIES:STORIES, EPICS:EPICS, THEMES:THEMES };
}
if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init); } else { init(); }
})();</script>
</body>
</html>
